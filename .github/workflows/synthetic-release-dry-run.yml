name: synthetic-release-dry-run

"on":
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  dry-run:
    name: Synthetic release dry run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run synthetic release dry run
        run: bash scripts/check_synthetic_release_local.sh

      - name: Reconcile generated dry-run receipt with tracked state
        run: |
          set -euo pipefail
          status="$(git status --short -- release/dry_runs/synthetic_release_dry_run_receipt.json)"
          if [[ -n "$status" ]]; then
            echo "Synthetic release dry-run receipt drift detected. Commit the updated dry-run receipt or fix the generator." >&2
            echo "$status" >&2
            exit 1
          fi

      - name: Write reviewer summary
        if: always()
        run: |
          {
            echo "## Synthetic release dry-run summary"
            echo ""
            echo "- Workflow: synthetic-release-dry-run"
            echo "- Mode: SYNTHETIC_NO_NETWORK"
            echo "- Publication decision: REFUSE"
            echo "- Receipt: release/dry_runs/synthetic_release_dry_run_receipt.json"
            echo "- Rollback: revert this workflow change or restore the tracked receipt/generator pair"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload synthetic release dry-run receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-release-dry-run-receipt
          if-no-files-found: ignore
          path: release/dry_runs/synthetic_release_dry_run_receipt.json
