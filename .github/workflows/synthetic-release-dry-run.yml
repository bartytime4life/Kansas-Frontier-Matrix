name: synthetic-release-dry-run

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: bash scripts/check_synthetic_release_local.sh
