name: Verify tests and reproducibility

"on":
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"
  KFM_CI_MODE: verify-tests-and-reproducibility
  KFM_NO_NETWORK: "1"
  PYTHONHASHSEED: "0"
  TZ: UTC
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

jobs:
  verify:
    name: Tests, invariants, and reproducibility
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set deterministic build environment
        run: |
          set -euo pipefail
          mkdir -p .kfm-ci
          epoch="$(git log -1 --format=%ct)"
          echo "SOURCE_DATE_EPOCH=${epoch}" >> "$GITHUB_ENV"
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "commit=$(git rev-parse HEAD)"
            echo "source_date_epoch=${epoch}"
            echo "timezone=${TZ}"
          } | tee .kfm-ci/provenance.txt
          git ls-files -z | xargs -0 sha256sum -- | sort > .kfm-ci/tracked-files.before.sha256

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python validation dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ]; then
            python -m pip install -e '.[dev]' || python -m pip install -e .
          fi
          python -m pip install 'pytest==8.3.5' 'PyYAML==6.0.2'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Directory-boundary smoke test
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          import sys

          root = Path('.')
          errors = []
          warnings = []

          workflow = root / '.github' / 'workflows' / 'verify-tests-and-reproducibility.yml'
          if not workflow.is_file():
              errors.append('Missing .github/workflows/verify-tests-and-reproducibility.yml')

          domain_roots = {
              'hydrology', 'soil', 'soils', 'fauna', 'flora', 'habitat', 'geology',
              'atmosphere', 'air', 'roads', 'rail', 'roads-rail-trade',
              'settlements', 'settlements-infrastructure', 'archaeology', 'hazards',
              'agriculture', 'people', 'genealogy', 'dna', 'land-ownership',
          }
          present_domain_roots = sorted(
              name for name in domain_roots if (root / name).is_dir()
          )
          if present_domain_roots:
              errors.append(
                  'KFM Directory Rules violation: domain folders should not be repo roots: '
                  + ', '.join(present_domain_roots)
              )

          compatibility_roots = ['ui', 'web', 'jsonschema', 'policies', 'styles', 'viewer_templates']
          for name in compatibility_roots:
              path = root / name
              if path.is_dir() and not (path / 'README.md').is_file():
                  warnings.append(
                      f'Compatibility root {name}/ exists without README.md explaining canonical, legacy, generated, mirrored, or migration status.'
                  )

          report = {
              'workflow_present': workflow.is_file(),
              'present_root_domain_dirs': present_domain_roots,
              'warnings': warnings,
              'errors': errors,
          }
          Path('.kfm-ci/directory-boundary-report.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )

          for warning in warnings:
              print(f'::warning::{warning}')
          for error in errors:
              print(f'::error::{error}')
          if errors:
              sys.exit(1)
          PY
          echo "directory-boundary:pass" >> .kfm-ci/test-runs.txt

      - name: Validate JSON and YAML syntax
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          import sys
          import yaml

          skip_parts = {
              '.git', '.kfm-ci', 'node_modules', '.venv', 'venv', 'dist', 'build',
              'coverage', '.next', '.turbo', '.pytest_cache', '__pycache__'
          }
          files = []
          for path in Path('.').rglob('*'):
              if not path.is_file():
                  continue
              if any(part in skip_parts for part in path.parts):
                  continue
              if path.suffix.lower() in {'.json', '.yaml', '.yml'}:
                  files.append(path)

          errors = []
          parsed = []
          for path in sorted(files):
              try:
                  text = path.read_text(encoding='utf-8')
                  if path.suffix.lower() == '.json':
                      json.loads(text)
                  else:
                      yaml.safe_load(text)
                  parsed.append(str(path))
              except Exception as exc:
                  errors.append(f'{path}: {exc}')

          Path('.kfm-ci/parsed-config-files.txt').write_text('\n'.join(parsed) + ('\n' if parsed else ''), encoding='utf-8')
          if errors:
              Path('.kfm-ci/config-parse-errors.txt').write_text('\n'.join(errors) + '\n', encoding='utf-8')
              for error in errors:
                  print(f'::error::{error}')
              sys.exit(1)
          print(f'Parsed {len(parsed)} JSON/YAML file(s).')
          PY
          echo "config-syntax:pass" >> .kfm-ci/test-runs.txt

      - name: Run repo-native baseline check if present
        run: |
          set -euo pipefail
          if [ -x tools/ci/verify_baseline.sh ]; then
            tools/ci/verify_baseline.sh | tee .kfm-ci/verify_baseline.log
            echo "tools/ci/verify_baseline.sh:pass" >> .kfm-ci/test-runs.txt
          else
            echo "No executable tools/ci/verify_baseline.sh found; skipping repo-native baseline check." | tee .kfm-ci/verify_baseline.log
          fi

      - name: Run Python tests if present
        run: |
          set -euo pipefail
          mapfile -t py_tests < <(
            find . \
              -path './.git' -prune -o \
              -path './.kfm-ci' -prune -o \
              -path './node_modules' -prune -o \
              -path './.venv' -prune -o \
              -path './venv' -prune -o \
              -path './dist' -prune -o \
              -path './build' -prune -o \
              -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print | sort
          )
          if [ "${#py_tests[@]}" -gt 0 ]; then
            printf '%s\n' "${py_tests[@]}" > .kfm-ci/python-tests-discovered.txt
            python -m pytest -q | tee .kfm-ci/pytest.log
            echo "python:pytest:pass" >> .kfm-ci/test-runs.txt
          else
            echo "No Python tests discovered." | tee .kfm-ci/pytest.log
          fi

      - name: Run Node package tests and builds if present
        run: |
          set -euo pipefail
          corepack enable || true
          mapfile -t package_files < <(
            find . -maxdepth 4 \
              -path './.git' -prune -o \
              -path './.kfm-ci' -prune -o \
              -path './node_modules' -prune -o \
              -name package.json -type f -print | sort
          )
          if [ "${#package_files[@]}" -eq 0 ]; then
            echo "No package.json files discovered." | tee .kfm-ci/node-packages.log
            exit 0
          fi

          : > .kfm-ci/node-packages.log
          declare -A installed_lock_owners=()

          find_lock_owner() {
            local dir="$1"
            while true; do
              if [ -f "$dir/pnpm-lock.yaml" ] || [ -f "$dir/yarn.lock" ] || [ -f "$dir/package-lock.json" ] || [ -f "$dir/npm-shrinkwrap.json" ]; then
                printf '%s\n' "$dir"
                return 0
              fi
              if [ "$dir" = "." ] || [ "$dir" = "" ]; then
                return 1
              fi
              dir="$(dirname "$dir")"
            done
          }

          package_manager_for() {
            local dir="$1"
            if [ -f "$dir/pnpm-lock.yaml" ]; then
              printf 'pnpm\n'
            elif [ -f "$dir/yarn.lock" ]; then
              printf 'yarn\n'
            else
              printf 'npm\n'
            fi
          }

          install_owner_once() {
            local owner="$1"
            local pm="$2"
            if [ -n "${installed_lock_owners[$owner]:-}" ]; then
              return 0
            fi
            echo "Installing dependencies from lock owner ${owner} using ${pm}" | tee -a "$GITHUB_WORKSPACE/.kfm-ci/node-packages.log"
            pushd "$owner" >/dev/null
            case "$pm" in
              pnpm) pnpm install --frozen-lockfile ;;
              yarn) yarn install --immutable || yarn install --frozen-lockfile ;;
              npm) npm ci ;;
            esac
            popd >/dev/null
            installed_lock_owners[$owner]=1
          }

          run_script() {
            local pkg_dir="$1"
            local pm="$2"
            local script="$3"
            if node -e "const p=require('./${pkg_dir}/package.json'); process.exit(p.scripts && p.scripts['${script}'] ? 0 : 1)"; then
              case "$pm" in
                pnpm) pnpm --dir "$pkg_dir" run "$script" ;;
                yarn) yarn --cwd "$pkg_dir" "$script" ;;
                npm) npm --prefix "$pkg_dir" run "$script" ;;
              esac
              echo "node:${pkg_dir}:${script}:pass" >> "$GITHUB_WORKSPACE/.kfm-ci/test-runs.txt"
            else
              echo "No ${script} script in ${pkg_dir}; skipping." | tee -a "$GITHUB_WORKSPACE/.kfm-ci/node-packages.log"
            fi
          }

          for package_file in "${package_files[@]}"; do
            pkg_dir="${package_file%/package.json}"
            echo "== ${pkg_dir} ==" | tee -a "$GITHUB_WORKSPACE/.kfm-ci/node-packages.log"
            if ! owner="$(find_lock_owner "$pkg_dir")"; then
              echo "::error file=${package_file}::No lockfile found in this package or an ancestor; reproducible install is not defined."
              exit 1
            fi
            pm="$(package_manager_for "$owner")"
            install_owner_once "$owner" "$pm"
            run_script "$pkg_dir" "$pm" test
            run_script "$pkg_dir" "$pm" lint
            run_script "$pkg_dir" "$pm" build
          done

      - name: Run Makefile verification targets if present
        run: |
          set -euo pipefail
          if [ ! -f Makefile ]; then
            echo "No Makefile found." | tee .kfm-ci/make.log
            exit 0
          fi
          : > .kfm-ci/make.log
          for target in verify test reproducible verify-reproducibility; do
            if grep -Eq "^${target}:" Makefile; then
              echo "Running make ${target}" | tee -a .kfm-ci/make.log
              make "$target" | tee -a .kfm-ci/make.log
              echo "make:${target}:pass" >> .kfm-ci/test-runs.txt
            else
              echo "No Makefile target ${target}; skipping." | tee -a .kfm-ci/make.log
            fi
          done

      - name: Require at least one verification signal
        run: |
          set -euo pipefail
          if [ ! -s .kfm-ci/test-runs.txt ]; then
            echo "::error::No verification signal was recorded. Add tests, schema/config fixtures, tools/ci/verify_baseline.sh, or Makefile verification targets."
            exit 1
          fi
          sort -u .kfm-ci/test-runs.txt | tee .kfm-ci/test-runs.summary.txt

      - name: Reproducibility and clean-tree check
        run: |
          set -euo pipefail
          git ls-files -z | xargs -0 sha256sum -- | sort > .kfm-ci/tracked-files.after.sha256
          diff -u .kfm-ci/tracked-files.before.sha256 .kfm-ci/tracked-files.after.sha256
          git diff --exit-code
          git diff --cached --exit-code
          git status --short | tee .kfm-ci/git-status-after.txt
          if [ -s .kfm-ci/git-status-after.txt ]; then
            echo "::warning::Untracked files were produced. They are not tracked diffs, but should be reviewed if unexpected."
          fi

      - name: Upload verification receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kfm-verify-tests-and-reproducibility-${{ github.run_id }}
          path: .kfm-ci/
          if-no-files-found: warn
