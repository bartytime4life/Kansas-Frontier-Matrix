# KFM release evidence gate.
#
# Purpose:
#   Assemble a reviewer-readable release-evidence report and fail closed for
#   tag/release/manual strict runs when required release trust objects are absent.
#
# Boundary:
#   This workflow is orchestration only. It does not make publication authority,
#   does not read RAW/WORK/QUARANTINE as public truth, and does not replace
#   ReleaseManifest, ReleaseProofPack, PromotionDecision, RollbackCard, policy,
#   review, or correction records.

name: release-evidence

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: "KFM release or candidate id. Blank uses candidate-<sha>."
        required: false
        type: string
        default: ""
      strict:
        description: "Fail when required release evidence is missing or invalid."
        required: true
        type: boolean
        default: true
      release_manifest:
        description: "Expected ReleaseManifest path."
        required: false
        type: string
        default: "release/manifests/release-manifest.json"
      release_proof_pack:
        description: "Expected ReleaseProofPack or proof-pack directory path."
        required: false
        type: string
        default: "data/proofs/release-proof-pack.json"
      catalog_matrix:
        description: "Expected CatalogMatrix path."
        required: false
        type: string
        default: "data/catalog/catalog-matrix.json"
      promotion_decision:
        description: "Expected PromotionDecision path."
        required: false
        type: string
        default: "release/promotion/promotion-decision.json"
      rollback_card:
        description: "Expected RollbackCard path."
        required: false
        type: string
        default: "release/rollback/rollback-card.json"

  pull_request:
    paths:
      - ".github/workflows/release-evidence.yml"
      - ".github/actions/**"
      - "contracts/**"
      - "schemas/**"
      - "policy/**"
      - "tests/**"
      - "tools/**"
      - "scripts/**"
      - "data/catalog/**"
      - "data/proofs/**"
      - "data/receipts/**"
      - "data/published/**"
      - "release/**"
      - "CHANGELOG.md"

  push:
    branches:
      - main
    tags:
      - "v*"
      - "release-*"
    paths:
      - ".github/workflows/release-evidence.yml"
      - ".github/actions/**"
      - "contracts/**"
      - "schemas/**"
      - "policy/**"
      - "tests/**"
      - "tools/**"
      - "scripts/**"
      - "data/catalog/**"
      - "data/proofs/**"
      - "data/receipts/**"
      - "data/published/**"
      - "release/**"
      - "CHANGELOG.md"

  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-evidence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assemble-release-evidence:
    name: Assemble release evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RELEASE_ID_INPUT: "${{ github.event_name == 'workflow_dispatch' && inputs.release_id || '' }}"
      STRICT_RELEASE: "${{ ((github.event_name == 'workflow_dispatch' && inputs.strict) || startsWith(github.ref, 'refs/tags/') || github.event_name == 'release') }}"
      RELEASE_MANIFEST_PATH: "${{ github.event_name == 'workflow_dispatch' && inputs.release_manifest || 'release/manifests/release-manifest.json' }}"
      RELEASE_PROOF_PACK_PATH: "${{ github.event_name == 'workflow_dispatch' && inputs.release_proof_pack || 'data/proofs/release-proof-pack.json' }}"
      CATALOG_MATRIX_PATH: "${{ github.event_name == 'workflow_dispatch' && inputs.catalog_matrix || 'data/catalog/catalog-matrix.json' }}"
      PROMOTION_DECISION_PATH: "${{ github.event_name == 'workflow_dispatch' && inputs.promotion_decision || 'release/promotion/promotion-decision.json' }}"
      ROLLBACK_CARD_PATH: "${{ github.event_name == 'workflow_dispatch' && inputs.rollback_card || 'release/rollback/rollback-card.json' }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble evidence report
        id: assemble
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import datetime as _dt
          import glob
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ.get("GITHUB_WORKSPACE", ".")).resolve()
          out_dir = root / "_release_evidence"
          out_dir.mkdir(parents=True, exist_ok=True)

          sha = os.environ.get("GITHUB_SHA", "")
          release_id = (os.environ.get("RELEASE_ID_INPUT") or "").strip()
          if not release_id:
              release_id = f"candidate-{sha[:12] or 'unknown-sha'}"
          release_id_slug = "".join(ch if ch.isalnum() or ch in "-_." else "-" for ch in release_id).strip("-._")[:100]
          if not release_id_slug:
              release_id_slug = "release-evidence"

          strict_release = (os.environ.get("STRICT_RELEASE") or "").lower() == "true"

          forbidden_public_refs = (
              "data/raw/",
              "data/work/",
              "data/quarantine/",
              "/raw/",
              "/work/",
              "/quarantine/",
          )

          families = [
              {
                  "key": "release_manifest",
                  "label": "ReleaseManifest",
                  "env": "RELEASE_MANIFEST_PATH",
                  "required_when_strict": True,
                  "fallback_globs": [
                      "release/**/release-manifest*.json",
                      "release/**/ReleaseManifest*.json",
                      "data/proofs/**/release-manifest*.json",
                  ],
              },
              {
                  "key": "release_proof_pack",
                  "label": "ReleaseProofPack",
                  "env": "RELEASE_PROOF_PACK_PATH",
                  "required_when_strict": True,
                  "fallback_globs": [
                      "data/proofs/**/*proof*pack*.json",
                      "data/proofs/**/*proof*.json",
                      "release/**/*proof*pack*.json",
                      "release/**/*proof*.json",
                  ],
              },
              {
                  "key": "catalog_matrix",
                  "label": "CatalogMatrix",
                  "env": "CATALOG_MATRIX_PATH",
                  "required_when_strict": True,
                  "fallback_globs": [
                      "data/catalog/**/*catalog*matrix*.json",
                      "release/**/*catalog*matrix*.json",
                  ],
              },
              {
                  "key": "promotion_decision",
                  "label": "PromotionDecision",
                  "env": "PROMOTION_DECISION_PATH",
                  "required_when_strict": True,
                  "fallback_globs": [
                      "release/**/*promotion*decision*.json",
                      "data/proofs/**/*promotion*decision*.json",
                  ],
              },
              {
                  "key": "rollback_card",
                  "label": "RollbackCard",
                  "env": "ROLLBACK_CARD_PATH",
                  "required_when_strict": True,
                  "fallback_globs": [
                      "release/**/*rollback*card*.json",
                      "release/**/*rollback*.json",
                      "data/proofs/**/*rollback*.json",
                  ],
              },
              {
                  "key": "correction_notice",
                  "label": "CorrectionNotice",
                  "env": "CORRECTION_NOTICE_PATH",
                  "required_when_strict": False,
                  "fallback_globs": [
                      "release/**/*correction*notice*.json",
                      "data/proofs/**/*correction*notice*.json",
                      "data/proofs/**/*correction*.json",
                  ],
              },
          ]

          def rel(path: Path) -> str:
              try:
                  return path.resolve().relative_to(root).as_posix()
              except Exception:
                  return path.as_posix()

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as fh:
                  for chunk in iter(lambda: fh.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def collect_family(family: dict) -> dict:
              explicit = (os.environ.get(family["env"]) or "").strip()
              candidates = []
              warnings = []

              if explicit:
                  p = (root / explicit).resolve()
                  if p.exists() and p.is_file():
                      candidates.append(p)
                  elif p.exists() and p.is_dir():
                      candidates.extend(sorted(x for x in p.rglob("*") if x.is_file()))
                  else:
                      warnings.append(f"Configured path not found: {explicit}")

              if not candidates:
                  for pattern in family["fallback_globs"]:
                      candidates.extend(Path(x).resolve() for x in glob.glob(str(root / pattern), recursive=True))
                  candidates = sorted({p for p in candidates if p.exists() and p.is_file()})

              files = []
              parse_errors = []
              raw_ref_violations = []
              for p in candidates[:50]:
                  record = {
                      "path": rel(p),
                      "size_bytes": p.stat().st_size,
                      "sha256": sha256_file(p),
                      "json_status": "not_json",
                  }
                  if p.suffix.lower() == ".json":
                      try:
                          json.loads(p.read_text(encoding="utf-8"))
                          record["json_status"] = "valid"
                      except Exception as exc:
                          record["json_status"] = "invalid"
                          record["json_error"] = str(exc)
                          parse_errors.append(f"{rel(p)}: {exc}")
                  try:
                      text = p.read_text(encoding="utf-8", errors="ignore").lower()
                      for marker in forbidden_public_refs:
                          if marker in text:
                              raw_ref_violations.append(f"{rel(p)} references forbidden public-stage marker `{marker}`")
                  except Exception:
                      pass
                  if rel(p).startswith(("data/raw/", "data/work/", "data/quarantine/")):
                      raw_ref_violations.append(f"{rel(p)} is under a non-public lifecycle directory")
                  files.append(record)

              return {
                  "key": family["key"],
                  "label": family["label"],
                  "configured_path": explicit,
                  "required_when_strict": family["required_when_strict"],
                  "exists": bool(files),
                  "files": files,
                  "warnings": warnings,
                  "parse_errors": parse_errors,
                  "raw_ref_violations": raw_ref_violations,
              }

          results = [collect_family(family) for family in families]
          warnings = []
          failures = []

          for item in results:
              warnings.extend(item["warnings"])
              if item["required_when_strict"] and not item["exists"]:
                  message = f"Missing required release evidence family: {item['label']}"
                  if strict_release:
                      failures.append(message)
                  else:
                      warnings.append(message)
              if item["parse_errors"]:
                  failures.extend(f"Invalid JSON in {err}" for err in item["parse_errors"])
              if item["raw_ref_violations"]:
                  if strict_release:
                      failures.extend(item["raw_ref_violations"])
                  else:
                      warnings.extend(item["raw_ref_violations"])

          # Optional repo-native validators. They are invoked only if present so this
          # workflow can be added before every helper exists, while still surfacing gaps.
          optional_validators = [
              "tools/validators/release_assembly_report.py",
              "tools/ci/render_release_assembly_summary.py",
          ]
          validator_status = []
          for validator in optional_validators:
              path = root / validator
              validator_status.append({
                  "path": validator,
                  "exists": path.exists(),
                  "status": "available" if path.exists() else "not_present",
              })
              if not path.exists():
                  warnings.append(f"Optional release-evidence helper not present: {validator}")

          if failures:
              gate_result = "FAIL"
          elif warnings:
              gate_result = "WARN"
          else:
              gate_result = "PASS"

          report = {
              "schema_version": "kfm.release_evidence_report.v1",
              "generated_at": _dt.datetime.now(_dt.UTC).isoformat(),
              "release_id": release_id,
              "release_id_slug": release_id_slug,
              "strict_release": strict_release,
              "gate_result": gate_result,
              "workflow": os.environ.get("GITHUB_WORKFLOW"),
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
              "event_name": os.environ.get("GITHUB_EVENT_NAME"),
              "ref": os.environ.get("GITHUB_REF"),
              "sha": sha,
              "families": results,
              "optional_validators": validator_status,
              "warnings": warnings,
              "failures": failures,
              "boundary": {
                  "not_promotion_approval": True,
                  "public_clients_must_use_governed_release_artifacts": True,
                  "raw_work_quarantine_are_not_public_truth": True,
              },
          }

          report_path = out_dir / "release-evidence-report.json"
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          lines = []
          lines.append("# KFM release evidence report")
          lines.append("")
          lines.append(f"- **Release/candidate:** `{release_id}`")
          lines.append(f"- **Gate result:** `{gate_result}`")
          lines.append(f"- **Strict release mode:** `{strict_release}`")
          lines.append(f"- **Run:** `{os.environ.get('GITHUB_RUN_ID')}` attempt `{os.environ.get('GITHUB_RUN_ATTEMPT')}`")
          lines.append(f"- **Ref:** `{os.environ.get('GITHUB_REF')}`")
          lines.append(f"- **SHA:** `{sha}`")
          lines.append("")
          lines.append("> This report is release evidence assembly, not publication approval. Promotion still requires review, policy, release state, correction path, and rollback target.")
          lines.append("")
          lines.append("## Evidence families")
          lines.append("")
          lines.append("| Family | Required in strict mode | Found | Files |")
          lines.append("|---|---:|---:|---:|")
          for item in results:
              lines.append(f"| {item['label']} | {item['required_when_strict']} | {item['exists']} | {len(item['files'])} |")
          lines.append("")
          if warnings:
              lines.append("## Warnings")
              lines.extend(f"- {w}" for w in warnings)
              lines.append("")
          if failures:
              lines.append("## Failures")
              lines.extend(f"- {f}" for f in failures)
              lines.append("")
          lines.append("## Artifact")
          lines.append("")
          lines.append("See `release-evidence-report.json` for digests, path checks, parse status, and lifecycle-boundary findings.")
          lines.append("")
          summary_path = out_dir / "release-evidence-summary.md"
          summary_path.write_text("\n".join(lines), encoding="utf-8")

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as fh:
                  fh.write(f"release_id={release_id}\n")
                  fh.write(f"release_id_slug={release_id_slug}\n")
                  fh.write(f"gate_result={gate_result}\n")

          print(summary_path.read_text(encoding="utf-8"))
          PY

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          if [ -f _release_evidence/release-evidence-summary.md ]; then
            cat _release_evidence/release-evidence-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release evidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ steps.assemble.outputs.release_id_slug || github.run_id }}
          path: _release_evidence/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce release evidence gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          report_path = Path("_release_evidence/release-evidence-report.json")
          if not report_path.exists():
              raise SystemExit("release-evidence-report.json was not produced")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          if report.get("gate_result") == "FAIL":
              print("Release evidence gate failed:")
              for failure in report.get("failures", []):
                  print(f"- {failure}")
              raise SystemExit(1)
          print(f"Release evidence gate result: {report.get('gate_result')}")
          PY

