name: Runtime Proof - Soil Moisture

on:
  workflow_dispatch:
    inputs:
      proof_mode:
        description: "Fixture-first proof mode. Keep live source probes disabled unless a later reviewed workflow enables them."
        required: false
        default: fixture
        type: choice
        options:
          - fixture
          - dry-run
      allow_empty:
        description: "Allow the workflow to succeed when no repo-owned runtime-proof command is discovered. Default is fail-closed."
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - ".github/workflows/runtime-proof-soil-moisture.yml"
      - "apps/**"
      - "packages/**"
      - "runtime/**"
      - "pipelines/soil_moisture/**"
      - "pipelines/soil-moisture/**"
      - "tools/ci/**soil*"
      - "tools/validators/soil_moisture/**"
      - "tools/validators/soil-moisture/**"
      - "tests/e2e/runtime_proof/**"
      - "tests/integration/**soil_moisture*"
      - "tests/unit/**soil_moisture*"
      - "tests/fixtures/**soil_moisture*"
      - "fixtures/**soil_moisture*"
      - "contracts/**soil*"
      - "schemas/**soil*"
      - "policy/**soil*"
      - "policies/**soil*"
      - "data/registry/sources/**soil*"
      - "docs/domains/soil/**"
      - "docs/domains/soils/**"
      - "docs/**soil*"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/runtime-proof-soil-moisture.yml"
      - "apps/**"
      - "packages/**"
      - "runtime/**"
      - "pipelines/soil_moisture/**"
      - "pipelines/soil-moisture/**"
      - "tools/ci/**soil*"
      - "tools/validators/soil_moisture/**"
      - "tools/validators/soil-moisture/**"
      - "tests/e2e/runtime_proof/**"
      - "tests/integration/**soil_moisture*"
      - "tests/unit/**soil_moisture*"
      - "tests/fixtures/**soil_moisture*"
      - "fixtures/**soil_moisture*"
      - "contracts/**soil*"
      - "schemas/**soil*"
      - "policy/**soil*"
      - "policies/**soil*"
      - "data/registry/sources/**soil*"
      - "docs/domains/soil/**"
      - "docs/domains/soils/**"
      - "docs/**soil*"

permissions:
  contents: read

concurrency:
  group: runtime-proof-soil-moisture-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  KFM_RUNTIME_PROOF_LANE: soil_moisture
  KFM_PROOF_DIR: artifacts/runtime-proof/soil-moisture
  KFM_DISABLE_LIVE_SOURCE_PROBES: "1"
  KFM_REQUIRE_EVIDENCE_REFS: "1"
  KFM_REQUIRE_RUNTIME_ENVELOPE: "1"
  KFM_REQUIRE_FAIL_CLOSED: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  runtime-proof-soil-moisture:
    name: Fixture-first runtime proof
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Normalize proof inputs
        run: |
          set -euo pipefail
          mode="${{ github.event.inputs.proof_mode || 'fixture' }}"
          allow_empty="${{ github.event.inputs.allow_empty || 'false' }}"
          printf 'KFM_RUNTIME_PROOF_MODE=%s\n' "$mode" >> "$GITHUB_ENV"
          printf 'KFM_ALLOW_EMPTY_RUNTIME_PROOF=%s\n' "$allow_empty" >> "$GITHUB_ENV"
          mkdir -p "$KFM_PROOF_DIR"
          {
            echo "# Runtime Proof - Soil Moisture"
            echo
            echo "mode=$mode"
            echo "allow_empty=$allow_empty"
            echo "live_source_probes=disabled"
          } > "$KFM_PROOF_DIR/preflight.txt"

      - name: Preflight repository state
        run: |
          set -euo pipefail
          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "workflow=$GITHUB_WORKFLOW"
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_attempt=$GITHUB_RUN_ATTEMPT"
            echo "event=$GITHUB_EVENT_NAME"
            echo "ref=$GITHUB_REF"
            echo "sha=$GITHUB_SHA"
            echo "actor=$GITHUB_ACTOR"
            echo "repository=$GITHUB_REPOSITORY"
            echo "lane=$KFM_RUNTIME_PROOF_LANE"
            echo "mode=$KFM_RUNTIME_PROOF_MODE"
            echo "git_status_start"
            git status --short || true
            echo "git_status_end"
          } | tee "$KFM_PROOF_DIR/repo-state.txt"

      - name: Install repo test dependencies when declared
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          elif [ -f requirements-test.txt ]; then
            python -m pip install -r requirements-test.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install -e ".[test]" || python -m pip install -e ".[dev]" || python -m pip install -e .
          else
            echo "No Python dependency manifest found; using runner and repository defaults."
          fi

      - name: Discover repo-owned runtime-proof commands
        id: discover
        run: |
          set -euo pipefail
          commands="$KFM_PROOF_DIR/commands.txt"
          : > "$commands"

          add_command() {
            printf '%s\n' "$1" >> "$commands"
          }

          if [ -f tools/ci/runtime_proof_soil_moisture.sh ]; then
            chmod +x tools/ci/runtime_proof_soil_moisture.sh
            add_command "./tools/ci/runtime_proof_soil_moisture.sh"
          fi

          if [ -f Makefile ] && grep -Eq '(^|[[:space:]])runtime-proof-soil-moisture:' Makefile; then
            add_command "make runtime-proof-soil-moisture"
          fi

          if [ -f tests/e2e/runtime_proof/soil_moisture/test_runtime_soil_moisture_proof.py ]; then
            add_command "python -m pytest tests/e2e/runtime_proof/soil_moisture/test_runtime_soil_moisture_proof.py -q"
          fi

          if [ -f tests/e2e/runtime_proof/soil_moisture/test_runtime_route_soil_moisture.py ]; then
            add_command "python -m pytest tests/e2e/runtime_proof/soil_moisture/test_runtime_route_soil_moisture.py -q"
          fi

          if [ -d tests/e2e/runtime_proof/soil_moisture ] && [ -z "$(cat "$commands")" ]; then
            add_command "python -m pytest tests/e2e/runtime_proof/soil_moisture -q"
          fi

          if [ -f tests/integration/test_soil_moisture_thin_slice.py ]; then
            add_command "python -m pytest tests/integration/test_soil_moisture_thin_slice.py -q"
          fi

          if [ -f tests/integration/test_soil_moisture_runtime_proof.py ]; then
            add_command "python -m pytest tests/integration/test_soil_moisture_runtime_proof.py -q"
          fi

          if [ -f tests/e2e/runtime_proof/test_governed_api_app.py ]; then
            add_command "python -m pytest tests/e2e/runtime_proof/test_governed_api_app.py -q"
          fi

          if [ -f pipelines/soil_moisture/mesonet/cli.py ]; then
            add_command "python -m pipelines.soil_moisture.mesonet.cli fixture-e2e"
          fi

          count=$(grep -cve '^$' "$commands" || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "commands_file=$commands" >> "$GITHUB_OUTPUT"
          echo "Discovered $count runtime-proof command(s)."
          sed 's/^/- /' "$commands" | tee "$KFM_PROOF_DIR/discovered-commands.md"

      - name: Handle missing runtime-proof command
        if: steps.discover.outputs.count == '0'
        run: |
          set -euo pipefail
          if [ "${KFM_ALLOW_EMPTY_RUNTIME_PROOF:-false}" = "true" ]; then
            cat > "$KFM_PROOF_DIR/runtime-proof-soil-moisture.json" <<'JSON'
          {
            "lane": "soil_moisture",
            "outcome": "ABSTAIN",
            "reason_codes": ["NO_RUNTIME_PROOF_COMMAND_DISCOVERED", "ALLOW_EMPTY_RUNTIME_PROOF_TRUE"],
            "fixture_only": true,
            "live_source_probes": false,
            "obligations": [
              "Add a repo-owned runtime proof command, Make target, pytest file, or fixture CLI before treating this workflow as proof."
            ]
          }
          JSON
            echo "No runtime-proof command was discovered. allow_empty=true, so the workflow records ABSTAIN."
            exit 0
          fi

          cat > "$KFM_PROOF_DIR/runtime-proof-soil-moisture.json" <<'JSON'
          {
            "lane": "soil_moisture",
            "outcome": "DENY",
            "reason_codes": ["NO_RUNTIME_PROOF_COMMAND_DISCOVERED"],
            "fixture_only": true,
            "live_source_probes": false,
            "obligations": [
              "Add a repo-owned runtime proof command, Make target, pytest file, or fixture CLI before treating this workflow as proof."
            ]
          }
          JSON
          echo "No runtime-proof command was discovered. Failing closed."
          exit 1

      - name: Execute soil-moisture runtime proof
        if: steps.discover.outputs.count != '0'
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time
          from pathlib import Path

          proof_dir = Path(os.environ["KFM_PROOF_DIR"])
          commands_file = proof_dir / "commands.txt"
          commands = [line.strip() for line in commands_file.read_text().splitlines() if line.strip()]
          results = []
          overall_exit = 0

          env = os.environ.copy()
          env.update({
              "KFM_RUNTIME_PROOF_LANE": "soil_moisture",
              "KFM_RUNTIME_PROOF_MODE": env.get("KFM_RUNTIME_PROOF_MODE", "fixture"),
              "KFM_DISABLE_LIVE_SOURCE_PROBES": "1",
              "KFM_REQUIRE_EVIDENCE_REFS": "1",
              "KFM_REQUIRE_RUNTIME_ENVELOPE": "1",
              "KFM_REQUIRE_FAIL_CLOSED": "1",
          })

          for index, command in enumerate(commands, start=1):
              print(f"::group::runtime proof command {index}: {command}", flush=True)
              start = time.time()
              proc = subprocess.run(command, shell=True, env=env)
              duration = round(time.time() - start, 3)
              print("::endgroup::", flush=True)
              status = "PASS" if proc.returncode == 0 else "ERROR"
              if proc.returncode != 0:
                  overall_exit = proc.returncode or 1
              results.append({
                  "index": index,
                  "command": command,
                  "exit_code": proc.returncode,
                  "status": status,
                  "duration_seconds": duration,
              })

          outcome = "ANSWER" if overall_exit == 0 else "ERROR"
          manifest = {
              "schema_hint": "kfm.runtime_proof_soil_moisture.v1",
              "lane": "soil_moisture",
              "outcome": outcome,
              "fixture_only": True,
              "live_source_probes": False,
              "requires_evidence_refs": True,
              "requires_runtime_envelope": True,
              "requires_fail_closed_behavior": True,
              "github": {
                  "workflow": os.environ.get("GITHUB_WORKFLOW"),
                  "run_id": os.environ.get("GITHUB_RUN_ID"),
                  "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
                  "event_name": os.environ.get("GITHUB_EVENT_NAME"),
                  "repository": os.environ.get("GITHUB_REPOSITORY"),
                  "ref": os.environ.get("GITHUB_REF"),
                  "sha": os.environ.get("GITHUB_SHA"),
              },
              "commands": results,
              "reason_codes": [] if overall_exit == 0 else ["RUNTIME_PROOF_COMMAND_FAILED"],
          }
          (proof_dir / "runtime-proof-soil-moisture.json").write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n")
          sys.exit(overall_exit)
          PY

      - name: Validate runtime-proof manifest shape
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          path = Path(os.environ["KFM_PROOF_DIR"]) / "runtime-proof-soil-moisture.json"
          if not path.exists():
              print(f"missing manifest: {path}")
              sys.exit(1)
          data = json.loads(path.read_text())
          allowed = {"ANSWER", "ABSTAIN", "DENY", "ERROR"}
          required = ["lane", "outcome", "fixture_only", "live_source_probes"]
          missing = [key for key in required if key not in data]
          if missing:
              print(f"manifest missing required keys: {missing}")
              sys.exit(1)
          if data["outcome"] not in allowed:
              print(f"invalid outcome: {data['outcome']}")
              sys.exit(1)
          if data["lane"] != "soil_moisture":
              print(f"invalid lane: {data['lane']}")
              sys.exit(1)
          if data["live_source_probes"] is not False:
              print("runtime proof must keep live source probes disabled")
              sys.exit(1)
          print(json.dumps({"validated_manifest": str(path), "outcome": data["outcome"]}, indent=2))
          PY

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Runtime Proof - Soil Moisture"
            echo
            echo "- Lane: \`soil_moisture\`"
            echo "- Mode: \`${KFM_RUNTIME_PROOF_MODE:-fixture}\`"
            echo "- Live source probes: disabled"
            echo "- Artifact directory: \`$KFM_PROOF_DIR\`"
            echo
            echo "### Discovered commands"
            if [ -s "$KFM_PROOF_DIR/commands.txt" ]; then
              sed 's/^/- `/' "$KFM_PROOF_DIR/commands.txt" | sed 's/$/`/'
            else
              echo "- none"
            fi
            echo
            echo "### Manifest"
            if [ -f "$KFM_PROOF_DIR/runtime-proof-soil-moisture.json" ]; then
              echo '```json'
              cat "$KFM_PROOF_DIR/runtime-proof-soil-moisture.json"
              echo '```'
            else
              echo "Manifest missing."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-proof-soil-moisture-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/runtime-proof/soil-moisture/
          if-no-files-found: error
          retention-days: 30

