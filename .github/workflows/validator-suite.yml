# KFM validator-suite workflow.
#
# Responsibility:
#   Run the repository-owned aggregate schema validators and prove that the
#   reviewed invalid EvidenceBundle canary is rejected for its expected schema
#   reason rather than treating any arbitrary command failure as fail-closed.
#
# Trigger and trust boundary:
#   Pull requests, pushes to main, and explicit dispatch. Pull-request content
#   is untrusted. Jobs use a GitHub-hosted runner and read-only repository token.
#   Network use is limited to installing dependencies declared by the root
#   Python project. No secret, write scope, OIDC, deployment, release, or
#   publication authority is provided.
#
# Inputs:
#   The root Makefile and pyproject, tools/validators/_common/run_all.py, its
#   configured validator scripts and fixtures, and the reviewed EvidenceBundle
#   invalid fixture plus expected-error sidecar.
#
# Outputs and outcomes:
#   GitHub job conclusions, logs, and step summaries only. This workflow emits
#   no ValidationReport, receipt, proof, PolicyDecision, lifecycle record,
#   release record, schema mutation, fixture mutation, or published artifact.
#
# Compatibility:
#   Preserve workflow name `validator-suite` and job ids/check names
#   `run-validators` and `ensure-fail-closed`; repository rules may refer to them.
#
# Supply-chain posture:
#   The repository currently uses floating major action tags. Immutable action
#   pinning remains a separately governed hardening item.
#
# Rollback:
#   Revert this file. Do not restore the prior negative shell pattern, which
#   accepted every nonzero exit as proof of the expected schema rejection.
#
# Placement:
#   `.github/workflows/` owns GitHub Actions orchestration. Validator logic,
#   schemas, fixtures, tests, evidence, policy, receipts, proofs, lifecycle data,
#   and release authority remain in their separate responsibility roots.

name: validator-suite

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validator-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: "0"
  PYTHONUNBUFFERED: "1"
  TZ: UTC

jobs:
  run-validators:
    name: run-validators
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tested revision without persisted credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up repository Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install declared validator dependencies
        shell: bash
        run: python -m pip install -e .

      - name: Require a non-vacuous aggregate validator inventory
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          from tools.validators._common.run_all import RUNNER_VALIDATORS

          assert RUNNER_VALIDATORS, "aggregate validator inventory is empty"
          assert len(RUNNER_VALIDATORS) == len(set(RUNNER_VALIDATORS)), (
              "aggregate validator inventory contains duplicate entries"
          )

          validator_root = Path("tools/validators")
          missing = []
          malformed = []
          for filename in RUNNER_VALIDATORS:
              if Path(filename).name != filename or not filename.startswith("validate_"):
                  malformed.append(filename)
                  continue
              path = validator_root / filename
              if not path.is_file():
                  missing.append(path.as_posix())

          assert not malformed, f"malformed validator inventory entries: {malformed}"
          assert not missing, f"configured validator scripts are missing: {missing}"

          runner_text = Path("tools/validators/_common/run_all.py").read_text(
              encoding="utf-8"
          )
          assert '"--fixtures"' in runner_text, (
              "aggregate runner no longer invokes configured validators in fixture mode"
          )

          print(
              "CONFIRMED: aggregate validator inventory is non-empty, unique, "
              f"and resolves to {len(RUNNER_VALIDATORS)} validator scripts."
          )
          print(
              "BOUNDARY: inventory presence does not prove complete schema-tree, "
              "semantic, evidence, policy, rights, sensitivity, or release coverage."
          )
          PY

      - name: Run repository aggregate validators
        shell: bash
        run: |
          set -euo pipefail
          make schemas

      - name: Record aggregate-validator boundary
        if: always()
        shell: bash
        run: |
          {
            echo "### Aggregate validator suite"
            echo
            echo "- Result: ${{ job.status }}."
            echo "- Command: \`make schemas\`."
            echo "- The runner inventory must be non-empty, unique, fixture-mode wired, and resolve to repository validator scripts."
            echo "- A green result proves only the configured validator/fixture behavior; it does not establish semantic truth, EvidenceBundle closure, source authority, policy approval, rights or sensitivity clearance, release readiness, or publication authority."
            echo "- No validation report, receipt, proof, policy decision, lifecycle record, release record, or published artifact was emitted."
          } >> "$GITHUB_STEP_SUMMARY"

  ensure-fail-closed:
    name: ensure-fail-closed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tested revision without persisted credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up repository Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install declared validator dependencies
        shell: bash
        run: python -m pip install -e .

      - name: Require the reviewed invalid EvidenceBundle rejection
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          validator = Path("tools/validators/validate_evidence_bundle.py")
          fixture = Path(
              "fixtures/contracts/v1/evidence/evidence_bundle/invalid/invalid_1.json"
          )
          expectation = fixture.with_suffix(".expected_error.txt")

          for path in (validator, fixture, expectation):
              assert path.is_file(), f"required fail-closed canary input is missing: {path}"

          expected_tokens = [
              line.strip().lower()
              for line in expectation.read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          assert expected_tokens, f"expected-error sidecar is empty: {expectation}"

          result = subprocess.run(
              [sys.executable, str(validator), str(fixture)],
              capture_output=True,
              text=True,
              check=False,
          )
          combined = "\n".join(
              part.strip() for part in (result.stdout, result.stderr) if part.strip()
          )
          if combined:
              print(combined)

          assert result.returncode == 1, (
              "invalid EvidenceBundle must produce validator rejection exit code 1; "
              f"received {result.returncode}. Output: {combined!r}"
          )

          expected_prefix = f"FAIL {fixture}:"
          assert combined.startswith(expected_prefix), (
              "invalid fixture did not produce the reviewed validator failure surface; "
              f"expected prefix {expected_prefix!r}, received {combined!r}"
          )

          lowered = combined.lower()
          missing_tokens = [token for token in expected_tokens if token not in lowered]
          assert not missing_tokens, (
              "validator rejection did not match the expected-error sidecar; "
              f"missing {missing_tokens}, output: {combined!r}"
          )
          assert "bundle_id" in lowered, (
              "reviewed canary no longer fails for missing bundle_id; "
              f"inspect fixture/schema drift: {combined!r}"
          )

          print(
              "CONFIRMED: invalid EvidenceBundle was rejected with the expected "
              "required-property failure rather than an arbitrary command error."
          )
          print(
              "BOUNDARY: this is one schema fail-closed canary, not evidence, policy, "
              "release, runtime, or public-safety proof."
          )
          PY

      - name: Record fail-closed canary boundary
        if: always()
        shell: bash
        run: |
          {
            echo "### Fail-closed validator canary"
            echo
            echo "- Result: ${{ job.status }}."
            echo "- The reviewed invalid EvidenceBundle must exit with code 1 and report the expected missing-\`bundle_id\` required-property failure."
            echo "- Missing files, validator crashes, dependency failures, schema-load failures, or unrelated nonzero exits are not accepted as proof of the canary."
            echo "- This remains a single bounded negative fixture; broader validator and lifecycle gate coverage remains separate work."
          } >> "$GITHUB_STEP_SUMMARY"
