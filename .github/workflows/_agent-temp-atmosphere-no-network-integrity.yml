name: agent-temp-atmosphere-no-network-integrity

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Append committed README integrity to draft PR body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          path='tests/domains/atmosphere/no-network/README.md'
          python - <<'PY' > /tmp/integrity.txt
          from pathlib import Path
          import hashlib, re

          path = Path('tests/domains/atmosphere/no-network/README.md')
          data = path.read_bytes()
          text = data.decode('utf-8')
          lines = text.splitlines()

          headings = []
          for line in lines:
              match = re.match(r'^(#{1,6})\s+(.+?)\s*$', line)
              if match:
                  title = re.sub(r'[`*_~]', '', match.group(2))
                  slug = title.lower()
                  slug = re.sub(r'<[^>]+>', '', slug)
                  slug = re.sub(r'[^\w\- ]', '', slug, flags=re.UNICODE)
                  slug = re.sub(r'[\s\-]+', '-', slug).strip('-')
                  headings.append((len(match.group(1)), slug))

          anchors = {slug for _, slug in headings}
          anchors.update(re.findall(r'<a\s+id=["\']([^"\']+)["\']', text))
          internal = re.findall(r'\[[^\]]+\]\(#([^\)]+)\)', text)
          unresolved = sorted(set(internal) - anchors)

          print(f'SHA256={hashlib.sha256(data).hexdigest()}')
          print(f'GIT_BLOB={hashlib.sha1(b"blob "+str(len(data)).encode()+b"\\0"+data).hexdigest()}')
          print(f'BYTES={len(data)}')
          print(f'LINES={data.count(chr(10).encode())}')
          print(f'H1_COUNT={sum(1 for level, _ in headings if level == 1)}')
          print(f'HEADING_COUNT={len(headings)}')
          print(f'UNIQUE_ANCHOR_COUNT={len(anchors)}')
          print(f'FENCE_LINES={sum(1 for line in lines if line.startswith("```"))}')
          print(f'INTERNAL_LINKS={len(internal)}')
          print(f'UNRESOLVED_INTERNAL_LINKS={len(unresolved)}')
          print(f'FINAL_NEWLINE={data.endswith(chr(10).encode())}')
          PY
          current=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq .body)
          body=$(cat <<EOF
          $current

          <!-- TEMPORARY_ATMO_NO_NETWORK_INTEGRITY -->
          ## Temporary committed README integrity

          \`\`\`text
          $(cat /tmp/integrity.txt)
          \`\`\`
          EOF
          )
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --body "$body"
