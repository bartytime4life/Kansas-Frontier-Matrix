name: agent-temp-low-cost-sensor-caveat-integrity

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/tests-domains-atmosphere-policy-deny-low-cost-sensor-caveat-readme-v3-1-20260716
          fetch-depth: 0
      - name: Measure committed README
        shell: bash
        run: |
          set -euo pipefail
          path='tests/domains/atmosphere/policy-deny/low-cost-sensor-caveat/README.md'
          report='.agent-verification/low-cost-sensor-caveat-integrity.json'
          mkdir -p .agent-verification
          python - <<'PY'
          from pathlib import Path
          import hashlib, json, re, subprocess

          path = Path('tests/domains/atmosphere/policy-deny/low-cost-sensor-caveat/README.md')
          report = Path('.agent-verification/low-cost-sensor-caveat-integrity.json')
          data = path.read_bytes()
          text = data.decode('utf-8')
          lines = text.splitlines()

          headings = []
          for line in lines:
              m = re.match(r'^(#{1,6})\s+(.+?)\s*$', line)
              if not m:
                  continue
              title = re.sub(r'[`*_~]', '', m.group(2))
              slug = title.lower()
              slug = re.sub(r'<[^>]+>', '', slug)
              slug = re.sub(r'[^\w\- ]', '', slug, flags=re.UNICODE)
              slug = re.sub(r'[\s\-]+', '-', slug).strip('-')
              headings.append((len(m.group(1)), slug))

          anchors = {slug for _, slug in headings}
          anchors.update(re.findall(r'<a\s+id=["\']([^"\']+)["\']', text))
          internal = re.findall(r'\[[^\]]+\]\(#([^\)]+)\)', text)
          unresolved = sorted(set(internal) - anchors)
          git_blob = subprocess.check_output(['git', 'hash-object', str(path)], text=True).strip()

          payload = {
              'path': str(path),
              'sha256': hashlib.sha256(data).hexdigest(),
              'git_blob': git_blob,
              'bytes': len(data),
              'lines': data.count(b'\n'),
              'h1_count': sum(1 for level, _ in headings if level == 1),
              'heading_count': len(headings),
              'unique_anchor_count': len(anchors),
              'fence_lines': sum(1 for line in lines if line.startswith('```')),
              'markdown_links': len(re.findall(r'\[[^\]]+\]\([^\)]+\)', text)),
              'internal_links': len(internal),
              'unresolved_internal_links': unresolved,
              'final_newline': data.endswith(b'\n'),
          }
          report.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          if git diff --quiet -- "$report"; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$report"
          git commit -m 'chore(agent): record low-cost sensor README integrity'
          git push
