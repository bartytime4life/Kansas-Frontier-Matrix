name: USDA PLANTS Review Preflight
on:
  workflow_dispatch:
    inputs:
      snapshot_date: {description: "Snapshot date YYYY-MM-DD", required: true, default: "2026-04-30"}
      reviewer_id: {description: "Reviewer ID", required: true, default: "flora-data-steward"}
      decision: {description: "Review decision", required: true, default: "approved_for_preflight", type: choice, options: [approved_for_preflight,rejected,needs_changes,abstain]}
      run_opa: {description: "Run OPA policy tests", required: false, default: "false", type: choice, options: ["true","false"]}
permissions: {contents: read}
jobs:
  review-preflight:
    runs-on: ubuntu-latest
    environment: usda-plants-review
    env: {CI: "true", KFM_ALLOW_NETWORK: "0", KFM_ALLOW_SCHEDULED_OBSERVATION: "0"}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.x"}
      - name: Run review/preflight tests
        run: pytest tests/flora/test_usda_plants_review_decision_builder.py tests/flora/test_usda_plants_sensitivity_review_builder.py tests/flora/test_usda_plants_rights_attestation_builder.py tests/flora/test_usda_plants_review_audit_ledger_builder.py tests/flora/test_usda_plants_promotion_preflight_builder.py tests/flora/test_usda_plants_review_preflight_chain.py
