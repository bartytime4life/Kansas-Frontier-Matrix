          """

          items = json.loads(zlib.decompress(base64.b64decode("".join(DATA_B64.split()))).decode())

          def title_from_path(path, schema=False):
              name = Path(path).name
              if schema:
                  name = name[:-len('.schema.json')]
                  name = name.split('.')[0]
              elif name.lower() == 'readme.md':
                  name = Path(path).parent.name
              else:
                  name = Path(path).stem
              return re.sub(r'[-_.]+', ' ', name).title()

          def contract_doc_for_schema(path):
              parts = path.split('/')
              if len(parts) >= 6 and parts[:4] == ['schemas', 'contracts', 'v1', 'domains']:
                  name = Path(path).name[:-len('.schema.json')]
                  return f"contracts/domains/{parts[4]}/{name}.md"
              return None

          def package_for_rego(path):
              stem = path[:-len('.rego')]
              return 'kfm.generated.' + '.'.join(re.sub(r'[^A-Za-z0-9_]', '_', part) for part in stem.split('/'))

          def render(path, source):
              if path == 'docs/adr/ADR-0001-schema-home.md':
                  return '# ADR-0001 - Schema Home\n\nThis compatibility pointer exists because domain docs reference `docs/adr/ADR-0001-schema-home.md`.\n\nCanonical ADR file: [ADR-0001-schema-home--schemas-contracts-v1-is-canonical.md](./ADR-0001-schema-home--schemas-contracts-v1-is-canonical.md).\n'
              if path.endswith('.md'):
                  return f'# {title_from_path(path)}\n\n**Status:** PROPOSED scaffold.\n**Source:** `{source}`\n\nThis file was created because the domain markdown inventory lists `{path}` as a planned or expected path. Fill in the authoritative content, owners, validation status, and links before promoting it beyond scaffold status.\n\n## Notes\n\n- Keep machine-checkable shape in `schemas/`, policy in `policy/`, fixtures in `fixtures/`, and release decisions in `release/` unless an accepted ADR says otherwise.\n- Replace this scaffold with domain-reviewed content before treating the path as canonical truth.\n'
              if path.endswith('.schema.json'):
                  obj = {
                      '$schema': 'https://json-schema.org/draft/2020-12/schema',
                      '$id': f'https://schemas.kfm.local/{path}',
                      'title': title_from_path(path, schema=True),
                      'type': 'object',
                      'description': f'PROPOSED scaffold for {path}. Fields are to be defined by the owning domain steward.',
                      'x-kfm': {
                          'status': 'PROPOSED',
                          'source_doc': source,
                          'contract_doc': contract_doc_for_schema(path),
                      },
                      'properties': {},
                      'additionalProperties': True,
                  }
                  return json.dumps(obj, indent=2) + '\n'
              if path.endswith('.json'):
                  obj = {
                      'status': 'PROPOSED',
                      'source_doc': source,
                      'path': path,
                      'notes': ['Placeholder created from docs/domains markdown inventory.'],
                  }
                  return json.dumps(obj, indent=2) + '\n'
              if path.endswith('.yaml'):
                  return f'status: PROPOSED\nsource_doc: {source}\npath: {path}\nnotes:\n  - Placeholder created from docs/domains markdown inventory.\n'
              if path.endswith('.py'):
                  return f'"""PROPOSED placeholder created from {source} for {path}."""\n'
              if path.endswith('.rego'):
                  return f'package {package_for_rego(path)}\n\n# Status: PROPOSED scaffold. Source: {source}\ndefault allow := false\n'
              if path.endswith('.geojson'):
                  return f'# PROPOSED placeholder created from {source} for {path}.\n'
              raise ValueError(path)

          for path, source in items:
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(render(path, source), encoding='utf-8')
          print(f'generated {len(items)} scaffold files')
          PY
      - name: Commit generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contracts data docs fixtures pipeline_specs pipelines policy schemas tests tools
          git rm --ignore-unmatch .github/workflows/kfm-scaffold-publish.yml
          if git diff --cached --quiet; then
            echo "No scaffold changes to commit."
            exit 0
          fi
          git commit -m "Add domain scaffold files from docs inventory"
          git push
