name: baseline
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python tools/validate_repo.py
      - run: python tools/validate_fixtures.py
      - run: python tools/validate_schema_conformance.py
      - run: python tools/check_directory_rules.py
      - run: python tools/check_no_public_internal_paths.py
      - run: python -m unittest discover -s tests
      - run: bash scripts/validate_all.sh
