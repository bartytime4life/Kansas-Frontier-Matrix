name: agent-temp-atmosphere-kc-hash

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-committed-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Append committed README integrity to draft PR body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          path='tests/domains/atmosphere/knowledge-character/README.md'
          sha256=$(sha256sum "$path" | awk '{print $1}')
          git_blob=$(git hash-object "$path")
          bytes=$(wc -c < "$path" | tr -d ' ')
          lines=$(wc -l < "$path" | tr -d ' ')
          h1=$(grep -Ec '^# ' "$path")
          fences=$(grep -Ec '^```' "$path")
          final_newline=$(python -c "from pathlib import Path; print(Path('$path').read_bytes().endswith(b'\\n'))")
          current=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body --jq .body)
          body=$(cat <<EOF
          $current

          <!-- TEMPORARY_ATMOSPHERE_KC_INTEGRITY -->
          ## Temporary committed README integrity

          - ARTIFACT_PATH: \`$path\`
          - SHA256: \`$sha256\`
          - GIT_BLOB: \`$git_blob\`
          - BYTES: \`$bytes\`
          - LINES: \`$lines\`
          - H1_COUNT: \`$h1\`
          - FENCE_LINES: \`$fences\`
          - FINAL_NEWLINE: \`$final_newline\`
          EOF
          )
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --body "$body"
