name: agent-temp-atmosphere-kc-hash

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-committed-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Put committed README integrity in temporary PR title
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          path='tests/domains/atmosphere/knowledge-character/README.md'
          sha256=$(sha256sum "$path" | awk '{print $1}')
          git_blob=$(git hash-object "$path")
          bytes=$(wc -c < "$path" | tr -d ' ')
          lines=$(wc -l < "$path" | tr -d ' ')
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --title "TEMP KC sha256=$sha256 blob=$git_blob bytes=$bytes lines=$lines"
