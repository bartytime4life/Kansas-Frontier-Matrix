name: verify-runtime

"on":
  pull_request:
    paths:
      - ".github/workflows/verify-runtime.yml"
      - ".github/actions/**"
      - "apps/governed_api/**"
      - "apps/governed-api/**"
      - "apps/api/**"
      - "packages/**"
      - "runtime/**"
      - "contracts/runtime/**"
      - "contracts/evidence/**"
      - "contracts/release/**"
      - "schemas/contracts/v1/runtime/**"
      - "schemas/contracts/v1/evidence/**"
      - "schemas/contracts/v1/release/**"
      - "schemas/contracts/v1/policy/**"
      - "policy/**"
      - "tests/contracts/**"
      - "tests/e2e/runtime_proof/**"
      - "tests/validators/**"
      - "tests/ci/**"
      - "tools/ci/**"
      - "tools/validators/**"
      - "data/published/governed_api/**"
      - "data/published/runtime_state/**"
      - "data/published/release_state/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-runtime.yml"
      - ".github/actions/**"
      - "apps/governed_api/**"
      - "apps/governed-api/**"
      - "apps/api/**"
      - "packages/**"
      - "runtime/**"
      - "contracts/runtime/**"
      - "contracts/evidence/**"
      - "contracts/release/**"
      - "schemas/contracts/v1/runtime/**"
      - "schemas/contracts/v1/evidence/**"
      - "schemas/contracts/v1/release/**"
      - "schemas/contracts/v1/policy/**"
      - "policy/**"
      - "tests/contracts/**"
      - "tests/e2e/runtime_proof/**"
      - "tests/validators/**"
      - "tests/ci/**"
      - "tools/ci/**"
      - "tools/validators/**"
      - "data/published/governed_api/**"
      - "data/published/runtime_state/**"
      - "data/published/release_state/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-runtime:
    name: Verify governed runtime behavior
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Prepare runtime verification environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema pyyaml
          for req in requirements.txt requirements-dev.txt dev-requirements.txt; do
            if [[ -f "$req" ]]; then
              python -m pip install -r "$req"
            fi
          done

      - name: Collect changed files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" \
              > artifacts/runtime/changed-files.txt
          else
            git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
              > artifacts/runtime/changed-files.txt || true
          fi
          sort -u artifacts/runtime/changed-files.txt -o artifacts/runtime/changed-files.txt
          sed -n '1,240p' artifacts/runtime/changed-files.txt

      - name: Inventory runtime surfaces and tests
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          from pathlib import Path

          out = Path("artifacts/runtime")
          out.mkdir(parents=True, exist_ok=True)

          watched_runtime_re = re.compile(
              r"^(apps/(governed_api|governed-api|api)/|runtime/|packages/.+runtime|"
              r"contracts/(runtime|evidence|release)/|"
              r"schemas/contracts/v1/(runtime|evidence|release|policy)/|"
              r"policy/|tests/(contracts|e2e/runtime_proof|validators|ci)/|"
              r"tools/(ci|validators)/|"
              r"data/published/(governed_api|runtime_state|release_state)/)"
          )

          changed = []
          changed_path = out / "changed-files.txt"
          if changed_path.exists():
              changed = [line.strip() for line in changed_path.read_text().splitlines() if line.strip()]

          runtime_changed = [p for p in changed if watched_runtime_re.search(p)]

          surface_dirs = [
              "apps/governed_api",
              "apps/governed-api",
              "apps/api",
              "runtime",
              "contracts/runtime",
              "contracts/evidence",
              "contracts/release",
              "schemas/contracts/v1/runtime",
              "schemas/contracts/v1/evidence",
              "schemas/contracts/v1/release",
              "policy",
              "tests/e2e/runtime_proof",
              "tools/ci",
              "tools/validators",
              "data/published/governed_api",
              "data/published/runtime_state",
              "data/published/release_state",
          ]
          surfaces = {p: Path(p).exists() for p in surface_dirs}

          exact_tests = [
              "tests/contracts/test_source_descriptor_schema.py",
              "tests/contracts/test_runtime_response_schema.py",
              "tests/contracts/test_runtime_response_envelope_schema.py",
              "tests/contracts/test_runtime_response_envelope.py",
              "tests/contracts/test_decision_envelope_schema.py",
              "tests/validators/test_soil_moisture_rules.py",
              "tests/validators/test_soil_moisture_validator.py",
              "tests/e2e/runtime_proof/soil_moisture/test_runtime_soil_moisture_proof.py",
              "tests/e2e/runtime_proof/soil_moisture/test_runtime_route_soil_moisture.py",
              "tests/e2e/runtime_proof/promotion/test_runtime_promotion_adapter.py",
              "tests/e2e/runtime_proof/promotion/test_runtime_promotion_route.py",
              "tests/e2e/runtime_proof/test_governed_api_app.py",
              "tests/ci/test_render_runtime_proof_summary.py",
          ]
          emit_tests = [
              "tests/e2e/runtime_proof/soil_moisture/test_runtime_emit_actual_responses.py",
          ]

          discovered: set[str] = set()
          for path in exact_tests:
              if Path(path).is_file():
                  discovered.add(path)

          tests_root = Path("tests")
          if tests_root.exists():
              for path in tests_root.rglob("test_*.py"):
                  s = path.as_posix()
                  if s in emit_tests:
                      continue
                  if (
                      "/runtime" in s
                      or "runtime_" in path.name
                      or "governed_api" in s
                      or "runtime_proof" in s
                      or "decision_envelope" in s
                  ):
                      discovered.add(s)

          emit_discovered = [p for p in emit_tests if Path(p).is_file()]

          pytest_targets = sorted(discovered)
          (out / "pytest-targets.txt").write_text("\n".join(pytest_targets) + ("\n" if pytest_targets else ""))
          (out / "emit-targets.txt").write_text("\n".join(emit_discovered) + ("\n" if emit_discovered else ""))

          inventory = {
              "runtime_changed_files": runtime_changed,
              "surfaces": surfaces,
              "pytest_targets": pytest_targets,
              "emit_targets": emit_discovered,
          }
          (out / "inventory.json").write_text(json.dumps(inventory, indent=2, sort_keys=True) + "\n")

          lines = [
              "# Runtime verification inventory",
              "",
              "## Runtime-relevant changed files",
          ]
          if runtime_changed:
              lines += [f"- `{p}`" for p in runtime_changed]
          else:
              lines.append("- None detected in this event diff.")
          lines += ["", "## Runtime surface presence"]
          lines += [f"- `{'PRESENT' if ok else 'missing'}: {p}`" for p, ok in surfaces.items()]
          lines += ["", "## Pytest targets"]
          lines += [f"- `{p}`" for p in pytest_targets] if pytest_targets else ["- None discovered."]
          lines += ["", "## Actual-response emit targets"]
          lines += [f"- `{p}`" for p in emit_discovered] if emit_discovered else ["- None discovered."]
          (out / "inventory.md").write_text("\n".join(lines) + "\n")

          needs_runtime_proof = bool(runtime_changed)
          proof_missing = needs_runtime_proof and not pytest_targets and not emit_discovered
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"NEEDS_RUNTIME_PROOF={'true' if needs_runtime_proof else 'false'}\n")
              env.write(f"RUNTIME_PROOF_MISSING={'true' if proof_missing else 'false'}\n")
          PY

      - name: Run contract, validator, and runtime-proof tests
        shell: bash
        run: |
          set -euo pipefail
          if [[ -s artifacts/runtime/pytest-targets.txt ]]; then
            python -m pytest -q $(tr '\n' ' ' < artifacts/runtime/pytest-targets.txt)
          else
            echo "::warning::No runtime pytest targets were discovered."
          fi

      - name: Emit actual runtime responses
        shell: bash
        run: |
          set -euo pipefail
          if [[ -s artifacts/runtime/emit-targets.txt ]]; then
            python -m pytest -q $(tr '\n' ' ' < artifacts/runtime/emit-targets.txt)
          else
            echo "::notice::No dedicated actual-response emission tests were discovered."
          fi

      - name: Validate emitted runtime response envelopes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import sys
          from pathlib import Path
          from typing import Any

          from jsonschema import Draft202012Validator, exceptions as js_exceptions

          out = Path("artifacts/runtime")
          out.mkdir(parents=True, exist_ok=True)

          outcome_values = {"ANSWER", "ABSTAIN", "DENY", "ERROR"}
          json_patterns = [
              "tests/e2e/runtime_proof/**/*.json",
              "data/published/governed_api/**/*.json",
              "data/published/runtime_state/**/*.json",
              "data/published/release_state/**/*.json",
          ]
          schema_candidates = [
              "schemas/contracts/v1/runtime/runtime_response_envelope.schema.json",
              "schemas/contracts/v1/runtime/runtime_response.schema.json",
              "schemas/contracts/v1/runtime/decision_envelope.schema.json",
              "jsonschema/runtime_response_envelope.schema.json",
          ]

          def load_json(path: Path) -> Any:
              with path.open("r", encoding="utf-8") as fh:
                  return json.load(fh)

          def extract_envelope(value: Any) -> dict[str, Any] | None:
              if not isinstance(value, dict):
                  return None
              for key in ("runtime_response_envelope", "runtimeResponseEnvelope", "response_envelope"):
                  candidate = value.get(key)
                  if isinstance(candidate, dict):
                      return candidate
              if "outcome" in value and isinstance(value.get("outcome"), str):
                  return value
              return None

          def has_support(envelope: dict[str, Any]) -> bool:
              support_keys = [
                  "citations",
                  "citation_refs",
                  "evidence_refs",
                  "evidenceRefs",
                  "evidence_bundle_refs",
                  "supporting_evidence",
              ]
              for key in support_keys:
                  value = envelope.get(key)
                  if isinstance(value, list) and len(value) > 0:
                      return True
                  if isinstance(value, dict) and len(value) > 0:
                      return True
              return False

          files: list[Path] = []
          for pattern in json_patterns:
              files.extend(Path(".").glob(pattern))
          files = sorted({p for p in files if p.is_file() and "artifacts/runtime" not in p.as_posix()})

          schemas = [Path(p) for p in schema_candidates if Path(p).is_file()]
          schema = None
          schema_path = None
          if schemas:
              schema_path = schemas[0]
              schema = load_json(schema_path)
              Draft202012Validator.check_schema(schema)
              validator = Draft202012Validator(schema)
          else:
              validator = None

          records: list[dict[str, Any]] = []
          errors: list[str] = []
          warnings: list[str] = []

          if not files:
              warnings.append("No runtime JSON payloads were found to inspect.")

          for path in files:
              try:
                  payload = load_json(path)
              except Exception as exc:  # noqa: BLE001
                  errors.append(f"{path}: invalid JSON: {exc}")
                  continue

              envelope = extract_envelope(payload)
              if envelope is None:
                  continue

              outcome = envelope.get("outcome")
              record = {"path": path.as_posix(), "outcome": outcome, "schema_validated": False}
              if outcome not in outcome_values:
                  errors.append(f"{path}: outcome must be one of {sorted(outcome_values)}, got {outcome!r}")
              if outcome == "ANSWER" and not has_support(envelope):
                  errors.append(f"{path}: ANSWER outcome requires citations or evidence references")
              if outcome in {"ABSTAIN", "DENY", "ERROR"}:
                  reason = envelope.get("reason") or envelope.get("reasons") or envelope.get("policy_decision")
                  if not reason:
                      warnings.append(f"{path}: {outcome} outcome has no explicit reason or policy_decision field")

              if validator is not None:
                  try:
                      validator.validate(envelope)
                      record["schema_validated"] = True
                  except js_exceptions.ValidationError as exc:
                      errors.append(f"{path}: schema validation failed against {schema_path}: {exc.message}")
              records.append(record)

          report = {
              "checked_payloads": records,
              "schema": schema_path.as_posix() if schema_path else None,
              "warnings": warnings,
              "errors": errors,
          }
          (out / "runtime-envelope-validation.json").write_text(json.dumps(report, indent=2, sort_keys=True) + "\n")

          lines = ["# Runtime response envelope validation", ""]
          lines.append(f"Schema used: `{schema_path.as_posix()}`" if schema_path else "Schema used: none discovered")
          lines.append("")
          lines.append("## Checked payloads")
          if records:
              lines += [f"- `{r['path']}` outcome=`{r['outcome']}` schema_validated=`{r['schema_validated']}`" for r in records]
          else:
              lines.append("- No runtime envelopes discovered.")
          if warnings:
              lines += ["", "## Warnings"] + [f"- {w}" for w in warnings]
          if errors:
              lines += ["", "## Errors"] + [f"- {e}" for e in errors]
          (out / "runtime-envelope-validation.md").write_text("\n".join(lines) + "\n")

          if errors:
              print("\n".join(errors), file=sys.stderr)
              sys.exit(1)
          PY

      - name: Render runtime proof summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/runtime
          if [[ -f tools/ci/render_runtime_proof_summary.py && -d tests/e2e/runtime_proof/soil_moisture/fixtures ]]; then
            python tools/ci/render_runtime_proof_summary.py \
              --fixtures tests/e2e/runtime_proof/soil_moisture/fixtures \
              --output artifacts/runtime/runtime-proof-summary.md \
              --title "Runtime Proof Summary"
          else
            {
              echo "# Runtime Proof Summary"
              echo
              echo "Generated by \`.github/workflows/verify-runtime.yml\`."
              echo
              if [[ -f artifacts/runtime/inventory.md ]]; then
                cat artifacts/runtime/inventory.md
              fi
              echo
              if [[ -f artifacts/runtime/runtime-envelope-validation.md ]]; then
                cat artifacts/runtime/runtime-envelope-validation.md
              fi
            } > artifacts/runtime/runtime-proof-summary.md
          fi
          cat artifacts/runtime/runtime-proof-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce runtime proof presence
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNTIME_PROOF_MISSING:-false}" == "true" ]]; then
            echo "::error::Runtime-relevant surfaces changed, but no runtime tests or actual-response emitters were discovered."
            echo "Add runtime-proof tests, emitted runtime envelopes, or narrow the workflow path filters if this change is not runtime-facing."
            exit 1
          fi
          if [[ "${NEEDS_RUNTIME_PROOF:-false}" == "true" ]]; then
            echo "Runtime-relevant change detected and runtime proof was present."
          else
            echo "No runtime-relevant change detected in this event diff."
          fi

      - name: Upload runtime verification summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-verification-summary
          path: artifacts/runtime/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload actual runtime responses
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-actual-responses
          path: |
            tests/e2e/runtime_proof/**/actual.response.json
            data/published/governed_api/**/*.json
            data/published/runtime_state/**/*.json
            data/published/release_state/**/*.json
          if-no-files-found: warn
          retention-days: 14

