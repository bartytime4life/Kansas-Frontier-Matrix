name: Rehearse rollback and correction

on:
  workflow_dispatch:
    inputs:
      domain:
        description: Fixture domain label used in dry-run evidence.
        required: false
        default: hydrology
      release_prefix:
        description: Fixture release prefix. The workflow appends :v1 and :v2.
        required: false
        default: rel:hydrology:demo
  pull_request:
    paths:
      - .github/workflows/rehearse-rollback-and-correction.yml
      - contracts/**
      - schemas/**
      - policy/**
      - tests/**
      - fixtures/**
      - tools/**
      - docs/**
      - data/proofs/**
      - data/published/**
      - release/**

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: rehearse-rollback-and-correction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run-rehearsal:
    name: Dry-run rollback/correction rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KFM_REHEARSAL_DIR: ${{ runner.temp }}/kfm-rollback-correction-rehearsal
      KFM_DOMAIN: ${{ github.event.inputs.domain || 'hydrology' }}
      KFM_RELEASE_PREFIX: ${{ github.event.inputs.release_prefix || 'rel:hydrology:demo' }}

    steps:
      - name: State the governed scope
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<'MARKDOWN'
          ## Rehearse rollback and correction

          This job is a **dry-run fixture rehearsal**. It does not promote, publish,
          deploy, mutate repository files, fetch live sources, or call model runtimes.

          It proves the minimum rollback/correction shape:

          1. Create a fixture release `v1`.
          2. Create a fixture release `v2` with one corrected object.
          3. Emit a `CorrectionNotice` linking `v1 -> v2`.
          4. Execute a dry-run `RollbackCard` from `v2 -> v1`.
          5. Confirm restored catalog, layer registry, API envelope, and Evidence Drawer payload point to `v1`.
          6. Confirm visible lineage still records that `v2` existed and was rolled back.
          MARKDOWN

      - name: Generate fixture release, correction, rollback, and restored-state evidence
        run: |
          set -euo pipefail
          python3 <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path
          from typing import Any

          root = Path(os.environ["KFM_REHEARSAL_DIR"])
          domain = os.environ.get("KFM_DOMAIN", "hydrology").strip() or "hydrology"
          release_prefix = os.environ.get("KFM_RELEASE_PREFIX", f"rel:{domain}:demo").strip() or f"rel:{domain}:demo"

          if not re.fullmatch(r"[A-Za-z0-9:_./@+-]+", release_prefix):
              raise SystemExit(f"unsafe release_prefix: {release_prefix!r}")
          if not re.fullmatch(r"[A-Za-z0-9_.-]+", domain):
              raise SystemExit(f"unsafe domain: {domain!r}")

          v1 = f"{release_prefix}:v1"
          v2 = f"{release_prefix}:v2"
          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat()

          def canonical_bytes(value: Any) -> bytes:
              return json.dumps(value, sort_keys=True, separators=(",", ":")).encode("utf-8")

          def digest(value: Any) -> str:
              return "sha256:" + hashlib.sha256(canonical_bytes(value)).hexdigest()

          def write_json(relative: str, value: Any) -> None:
              path = root / relative
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(json.dumps(value, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          feature_v1 = {
              "feature_id": f"feature:{domain}:demo:gauge-001",
              "claim": "Fixture gauge status is normal.",
              "status_value": "normal",
              "evidence_bundle_refs": [f"evb:{domain}:demo:bundle:001"],
              "release_id": v1,
              "sensitivity": "public_fixture",
          }
          feature_v2 = {
              **feature_v1,
              "claim": "Fixture gauge status is corrected to review-needed.",
              "status_value": "review_needed",
              "release_id": v2,
              "correction_of_release_id": v1,
          }

          manifest_v1 = {
              "object_type": "ReleaseManifest",
              "release_id": v1,
              "domain": domain,
              "release_state": "FIXTURE_PUBLISHED_DRY_RUN",
              "created_at": now,
              "artifacts": [{"path": "published/v1/feature.json", "digest": digest(feature_v1)}],
              "evidence_bundle_refs": feature_v1["evidence_bundle_refs"],
              "policy_decision_refs": [f"policy:{domain}:fixture:allow-public-demo"],
              "review_refs": [f"review:{domain}:fixture:dry-run"],
              "rollback_target_release_id": None,
              "limitations": ["dry_run_fixture_only", "not_a_publication_action"],
          }
          manifest_v2 = {
              "object_type": "ReleaseManifest",
              "release_id": v2,
              "domain": domain,
              "release_state": "FIXTURE_PUBLISHED_DRY_RUN",
              "created_at": now,
              "artifacts": [{"path": "published/v2/feature.json", "digest": digest(feature_v2)}],
              "evidence_bundle_refs": feature_v2["evidence_bundle_refs"],
              "policy_decision_refs": [f"policy:{domain}:fixture:allow-public-demo"],
              "review_refs": [f"review:{domain}:fixture:dry-run"],
              "rollback_target_release_id": v1,
              "limitations": ["dry_run_fixture_only", "not_a_publication_action"],
          }

          correction_notice = {
              "object_type": "CorrectionNotice",
              "correction_notice_id": f"correction:{domain}:demo:v1-to-v2",
              "domain": domain,
              "created_at": now,
              "affected_release_refs": [v1],
              "replacement_release_refs": [v2],
              "reason_codes": ["fixture.corrected_object"],
              "summary": "Fixture v2 corrects one object from fixture v1.",
              "visibility": "public_safe_summary",
              "evidence_bundle_refs": feature_v2["evidence_bundle_refs"],
          }

          rollback_card = {
              "object_type": "RollbackCard",
              "rollback_card_id": f"rollback:{domain}:demo:v2-to-v1:dry-run",
              "domain": domain,
              "mode": "dry_run",
              "from_release_id": v2,
              "to_release_id": v1,
              "created_at": now,
              "expected_state_after_rollback": {
                  "active_release_id": v1,
                  "rolled_back_release_id": v2,
                  "correction_notice_refs": [correction_notice["correction_notice_id"]],
              },
              "commands_or_procedure": [
                  "select prior release manifest",
                  "restore public-safe layer registry refs",
                  "restore catalog active release refs",
                  "emit correction/rollback lineage summary",
              ],
              "communication_note": "Dry-run fixture rollback only; no deployment or publication state changed.",
          }

          catalog_restored = {
              "object_type": "CatalogMatrixFixture",
              "domain": domain,
              "active_release_id": v1,
              "restored_from_release_id": v2,
              "dataset_refs": [f"dataset:{domain}:demo"],
              "release_manifest_refs": [v1],
              "correction_notice_refs": [correction_notice["correction_notice_id"]],
              "correction_lineage": [
                  {"release_id": v1, "state": "restored_active"},
                  {"release_id": v2, "state": "rolled_back_but_visible_in_lineage"},
              ],
          }
          layer_registry_restored = {
              "object_type": "LayerRegistryFixture",
              "layer_id": f"layer:{domain}:demo:gauge-status",
              "active_release_id": v1,
              "rolled_back_release_id": v2,
              "source_release_manifest_refs": [v1],
              "correction_notice_refs": [correction_notice["correction_notice_id"]],
              "public_path_refs": ["data/published/fixture/layer/demo"],
          }
          api_envelope_restored = {
              "object_type": "RuntimeResponseEnvelope",
              "envelope_id": f"env:{domain}:rollback-demo:restored-v1",
              "status": "ANSWER",
              "domain": domain,
              "action": "explain_feature_after_rollback_dry_run",
              "access_role": "public_fixture",
              "result_payload": feature_v1,
              "evidence_bundle_refs": feature_v1["evidence_bundle_refs"],
              "policy_decision_ref": f"policy:{domain}:fixture:allow-public-demo",
              "release_manifest_refs": [v1],
              "stale_state": "not_stale_fixture",
              "review_state": "reviewed_fixture",
              "correction_notice_refs": [correction_notice["correction_notice_id"]],
              "citations": [{"evidence_ref": feature_v1["evidence_bundle_refs"][0], "quote_policy": "fixture_no_quote"}],
              "limitations": ["dry_run_fixture_only"],
              "reason_codes": ["rollback.restored_prior_release"],
              "generated_at": now,
          }
          evidence_drawer_restored = {
              "object_type": "EvidenceDrawerPayloadFixture",
              "feature_id": feature_v1["feature_id"],
              "shown_release_id": v1,
              "rolled_back_release_id": v2,
              "claim": feature_v1["claim"],
              "evidence_bundle_refs": feature_v1["evidence_bundle_refs"],
              "release_manifest_refs": [v1],
              "correction_notice_refs": [correction_notice["correction_notice_id"]],
              "visible_lineage_note": "v2 existed, corrected v1, and was rolled back in dry-run rehearsal.",
          }

          public_surfaces = {
              "catalog": catalog_restored,
              "layer_registry": layer_registry_restored,
              "api_envelope": api_envelope_restored,
              "evidence_drawer": evidence_drawer_restored,
          }

          checks: list[dict[str, Any]] = []

          def check(name: str, ok: bool, detail: str) -> None:
              checks.append({"name": name, "ok": bool(ok), "detail": detail})

          check("release_v1_exists", manifest_v1["release_id"] == v1, v1)
          check("release_v2_exists", manifest_v2["release_id"] == v2, v2)
          check(
              "correction_links_v1_to_v2",
              correction_notice["affected_release_refs"] == [v1] and correction_notice["replacement_release_refs"] == [v2],
              "CorrectionNotice affected/replacement refs are correct.",
          )
          check(
              "rollback_card_v2_to_v1",
              rollback_card["from_release_id"] == v2 and rollback_card["to_release_id"] == v1 and rollback_card["mode"] == "dry_run",
              "RollbackCard is dry-run from v2 to v1.",
          )
          check("catalog_restored_to_v1", catalog_restored["active_release_id"] == v1, "Catalog active_release_id restored.")
          check("layer_registry_restored_to_v1", layer_registry_restored["active_release_id"] == v1, "Layer registry active_release_id restored.")
          check("api_envelope_restored_to_v1", api_envelope_restored["release_manifest_refs"] == [v1], "API envelope references restored release.")
          check("evidence_drawer_restored_to_v1", evidence_drawer_restored["shown_release_id"] == v1, "Evidence Drawer shows restored release.")
          check(
              "v2_visible_in_lineage",
              any(item["release_id"] == v2 and "rolled_back" in item["state"] for item in catalog_restored["correction_lineage"]),
              "Rolled-back v2 remains visible in correction lineage.",
          )
          public_surface_blob = json.dumps(public_surfaces, sort_keys=True).lower()
          forbidden_public_refs = ["data/raw/", "data/work/", "data/quarantine/", "raw/", "work/", "quarantine/"]
          check(
              "no_internal_lifecycle_paths_in_public_surfaces",
              not any(token in public_surface_blob for token in forbidden_public_refs),
              "Restored public surfaces do not point at RAW/WORK/QUARANTINE paths.",
          )

          report = {
              "object_type": "RollbackCorrectionRehearsalReport",
              "run_mode": "dry_run_fixture_only",
              "domain": domain,
              "generated_at": now,
              "release_ids": {"v1": v1, "v2": v2},
              "correction_notice_ref": correction_notice["correction_notice_id"],
              "rollback_card_ref": rollback_card["rollback_card_id"],
              "checks": checks,
              "passed": all(item["ok"] for item in checks),
              "non_actions": [
                  "no_live_source_fetch",
                  "no_publication",
                  "no_deployment",
                  "no_repository_mutation",
                  "no_model_runtime_call",
              ],
          }

          write_json("release/release_manifest_v1.json", manifest_v1)
          write_json("release/release_manifest_v2.json", manifest_v2)
          write_json("release/correction_notice_v1_to_v2.json", correction_notice)
          write_json("release/rollback_card_v2_to_v1.dry_run.json", rollback_card)
          write_json("published/v1/feature.json", feature_v1)
          write_json("published/v2/feature.json", feature_v2)
          write_json("restored/catalog_after_rollback.json", catalog_restored)
          write_json("restored/layer_registry_after_rollback.json", layer_registry_restored)
          write_json("restored/runtime_response_after_rollback.json", api_envelope_restored)
          write_json("restored/evidence_drawer_after_rollback.json", evidence_drawer_restored)
          write_json("rehearsal_report.json", report)

          summary_lines = [
              "# Rollback/correction rehearsal report",
              "",
              f"- Mode: `{report['run_mode']}`",
              f"- Domain: `{domain}`",
              f"- v1: `{v1}`",
              f"- v2: `{v2}`",
              f"- Correction notice: `{correction_notice['correction_notice_id']}`",
              f"- Rollback card: `{rollback_card['rollback_card_id']}`",
              f"- Passed: `{report['passed']}`",
              "",
              "## Checks",
              "",
          ]
          for item in checks:
              mark = "✅" if item["ok"] else "❌"
              summary_lines.append(f"- {mark} `{item['name']}` — {item['detail']}")
          summary_lines.extend([
              "",
              "## Non-actions",
              "",
              "This rehearsal did not fetch live sources, publish, deploy, mutate repository files, or call model runtimes.",
          ])
          (root / "summary.md").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")

          if not report["passed"]:
              raise SystemExit("rollback/correction rehearsal failed")
          PY

      - name: Validate required evidence files
        run: |
          set -euo pipefail
          required_files=(
            "release/release_manifest_v1.json"
            "release/release_manifest_v2.json"
            "release/correction_notice_v1_to_v2.json"
            "release/rollback_card_v2_to_v1.dry_run.json"
            "restored/catalog_after_rollback.json"
            "restored/layer_registry_after_rollback.json"
            "restored/runtime_response_after_rollback.json"
            "restored/evidence_drawer_after_rollback.json"
            "rehearsal_report.json"
            "summary.md"
          )

          for file in "${required_files[@]}"; do
            test -s "$KFM_REHEARSAL_DIR/$file"
          done

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["KFM_REHEARSAL_DIR"]) / "rehearsal_report.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          failed = [item for item in report["checks"] if not item["ok"]]
          if failed:
              raise SystemExit(f"failed checks: {failed!r}")
          print(json.dumps({"passed": True, "checks": len(report["checks"])}, sort_keys=True))
          PY

          cat "$KFM_REHEARSAL_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dry-run rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-correction-dry-run-evidence
          path: ${{ env.KFM_REHEARSAL_DIR }}/
          if-no-files-found: error
          retention-days: 14
