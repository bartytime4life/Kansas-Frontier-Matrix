name: incremental-stac-watcher

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "STAC catalog, collection, or item endpoint. Falls back to vars.KFM_STAC_SOURCE_URL."
        required: false
        type: string
      dry_run:
        description: "Run watcher and validation without pushing governed outputs."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      build_proof_pack:
        description: "Attempt proof-pack assembly after receipt validation."
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      open_pull_request:
        description: "Open or update a PR for validated receipt/proof outputs."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      output_branch:
        description: "Automation branch for validated watcher outputs."
        required: true
        default: "automation/incremental-stac-watcher"
        type: string
  schedule:
    # Daily receipts-first source freshness check. Keep publication separate from this watcher lane.
    - cron: "17 8 * * *"

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: incremental-stac-watcher-${{ github.ref }}
  cancel-in-progress: false

env:
  WATCHER_PATH: tools/watchers/incremental_stac_watcher.py
  WORK_DIR: data/work/watchers/incremental-stac
  RECEIPT_DIR: data/receipts/incremental_stac
  PROOF_DIR: data/proofs/incremental_stac
  SUMMARY_DIR: artifacts/incremental-stac-watcher
  SOURCE_URL: ${{ github.event.inputs.source_url || vars.KFM_STAC_SOURCE_URL || '' }}
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
  BUILD_PROOF_PACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_proof_pack || 'false' }}
  OPEN_PULL_REQUEST: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.open_pull_request || 'true' }}
  OUTPUT_BRANCH: ${{ github.event.inputs.output_branch || 'automation/incremental-stac-watcher' }}

jobs:
  watcher:
    if: ${{ github.event_name != 'schedule' || vars.KFM_STAC_SOURCE_URL != '' }}
    name: Run receipts-first incremental STAC watcher
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies when declared
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi
          if [ -f pyproject.toml ]; then
            python -m pip install -e ".[dev]" || python -m pip install -e .
          fi

      - name: Preflight watcher inputs and KFM responsibility roots
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$SOURCE_URL" ]; then
            echo "::add-mask::$SOURCE_URL"
          fi
          if [ -z "$SOURCE_URL" ]; then
            echo "::error::No STAC source configured. Provide workflow_dispatch input source_url or repository variable KFM_STAC_SOURCE_URL."
            exit 1
          fi
          if [ ! -f "$WATCHER_PATH" ]; then
            echo "::error::Missing watcher implementation at $WATCHER_PATH. Keep workflow YAML as orchestration only; implement watcher behavior under tools/watchers/."
            exit 1
          fi
          for required_root in data schemas policy tools; do
            if [ ! -d "$required_root" ]; then
              echo "::error::Missing required KFM responsibility root: $required_root"
              exit 1
            fi
          done
          mkdir -p "$WORK_DIR" "$RECEIPT_DIR" "$PROOF_DIR" "$SUMMARY_DIR"

      - name: Run incremental STAC watcher
        id: watcher_run
        shell: bash
        run: |
          set -euo pipefail
          args=(--source "$SOURCE_URL" --work-dir "$WORK_DIR" --out "$RECEIPT_DIR")
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          python "$WATCHER_PATH" "${args[@]}"

          latest_receipt="$(find "$RECEIPT_DIR" -type f -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -n 1 | cut -d' ' -f2- || true)"
          if [ -z "$latest_receipt" ]; then
            echo "::error::Watcher did not emit a JSON receipt under $RECEIPT_DIR. A no-change run should still emit process-memory receipt."
            exit 1
          fi
          echo "latest_receipt=$latest_receipt" >> "$GITHUB_OUTPUT"
          echo "receipt_sha256=$(sha256sum "$latest_receipt" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Validate watcher receipt contract
        shell: bash
        run: |
          set -euo pipefail
          receipt="${{ steps.watcher_run.outputs.latest_receipt }}"
          if command -v kfm-validate-contracts >/dev/null 2>&1; then
            kfm-validate-contracts --input "$receipt" --schema-dir schemas/
          elif [ -f tools/validators/validate_contracts.py ]; then
            python tools/validators/validate_contracts.py --input "$receipt" --schema-dir schemas/
          elif [ -f tools/validators/contract_validate.py ]; then
            python tools/validators/contract_validate.py --input "$receipt" --schema-dir schemas/
          elif [ -f tools/validators/validate_schema.py ]; then
            python tools/validators/validate_schema.py --input "$receipt" --schema-dir schemas/
          else
            echo "::error::No contract/schema validation entrypoint found. Add kfm-validate-contracts or a repo-local validator under tools/validators/."
            exit 1
          fi

      - name: Validate watcher receipt policy
        shell: bash
        run: |
          set -euo pipefail
          receipt="${{ steps.watcher_run.outputs.latest_receipt }}"
          if [ -f tools/validators/promotion_gate/policy_check.py ]; then
            python tools/validators/promotion_gate/policy_check.py --input "$receipt" --policy-dir policy/
          elif [ -f tools/validators/policy_gate.py ]; then
            python tools/validators/policy_gate.py --input "$receipt" --policy-dir policy/
          elif command -v conftest >/dev/null 2>&1; then
            conftest test "$receipt" -p policy/
          else
            echo "::error::No policy validation entrypoint found. Add a repo-local policy gate or install/pin conftest through the repo toolchain."
            exit 1
          fi

      - name: Optionally assemble proof pack after receipt validation
        if: env.BUILD_PROOF_PACK == 'true'
        shell: bash
        run: |
          set -euo pipefail
          receipt="${{ steps.watcher_run.outputs.latest_receipt }}"
          if command -v kfm-build-proof-pack >/dev/null 2>&1; then
            kfm-build-proof-pack --receipt "$receipt" --out "$PROOF_DIR"
          elif [ -f tools/attest/build_proof_pack.py ]; then
            python tools/attest/build_proof_pack.py --receipt "$receipt" --out "$PROOF_DIR"
          elif [ -f tools/attest/build_proof_pack.sh ]; then
            bash tools/attest/build_proof_pack.sh --receipt "$receipt" --out "$PROOF_DIR"
          else
            echo "::error::Proof-pack assembly requested, but no proof-pack builder was found."
            exit 1
          fi

      - name: Render watcher summary
        id: render_summary
        shell: bash
        run: |
          set -euo pipefail
          receipt="${{ steps.watcher_run.outputs.latest_receipt }}"
          summary="$SUMMARY_DIR/summary.md"
          {
            echo "# Incremental STAC Watcher"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Outcome | receipt emitted, contract-validated, and policy-validated |"
            echo "| Dry run | $DRY_RUN |"
            echo "| Receipt path | \`$receipt\` |"
            echo "| Receipt SHA-256 | \`${{ steps.watcher_run.outputs.receipt_sha256 }}\` |"
            echo "| Proof-pack requested | $BUILD_PROOF_PACK |"
            echo "| Working state root | \`$WORK_DIR\` |"
            echo "| Receipt root | \`$RECEIPT_DIR\` |"
            echo "| Proof root | \`$PROOF_DIR\` |"
            echo
            echo "This watcher is a receipt-bearing control lane. It does not publish STAC, replace catalog authority, or promote release state."
            echo
            echo "## Changed governed outputs"
            echo '```text'
            git status --short "$RECEIPT_DIR" "$PROOF_DIR" 2>/dev/null || true
            echo '```'
          } > "$summary"
          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          cat "$summary" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload receipt and reviewer summary
        uses: actions/upload-artifact@v4
        with:
          name: incremental-stac-watcher-receipt
          path: |
            ${{ steps.watcher_run.outputs.latest_receipt }}
            ${{ steps.render_summary.outputs.summary }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload optional proof-pack outputs
        if: env.BUILD_PROOF_PACK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: incremental-stac-watcher-proof
          path: data/proofs/incremental_stac/**
          if-no-files-found: error
          retention-days: 30

      - name: Commit validated governed outputs to automation branch
        id: commit_outputs
        if: env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$OUTPUT_BRANCH"
          git add "$RECEIPT_DIR" "$PROOF_DIR" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No governed receipt/proof output changes to commit."
            exit 0
          fi
          git commit -m "chore: record incremental STAC watcher receipt"
          git push --force-with-lease origin "$OUTPUT_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update watcher pull request
        if: env.DRY_RUN != 'true' && env.OPEN_PULL_REQUEST == 'true' && steps.commit_outputs.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="$(gh pr list --head "$OUTPUT_BRANCH" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "chore: record incremental STAC watcher receipts" \
              --body-file "${{ steps.render_summary.outputs.summary }}"
            echo "Updated existing PR #$pr_number"
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$OUTPUT_BRANCH" \
              --title "chore: record incremental STAC watcher receipts" \
              --body-file "${{ steps.render_summary.outputs.summary }}"
          fi

