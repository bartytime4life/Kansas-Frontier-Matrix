name: USDA PLANTS Deploy Pages
on:
  workflow_dispatch:
    inputs:
      snapshot_date: {description: "Snapshot date YYYY-MM-DD", required: true, default: "2026-04-30"}
      deploy_to_pages: {description: "Deploy to GitHub Pages", required: true, default: "false", type: choice, options: ["false","true"]}
permissions: {contents: read}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: {contents: read}
    env: {CI: "true", KFM_ALLOW_NETWORK: "0", KFM_ALLOW_SCHEDULED_OBSERVATION: "0"}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.x"}
      - name: Build static site artifact only
        run: |
          pytest tests/flora/test_usda_plants_static_deployment_chain.py tests/flora/test_usda_plants_github_pages_manifest_builder.py
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with: {path: site/flora/usda_plants/${{ inputs.snapshot_date }}}
  deploy:
    if: ${{ inputs.deploy_to_pages == 'true' }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions: {contents: read, pages: write, id-token: write}
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
