name: USDA PLANTS Manual Watch
on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: Snapshot date YYYY-MM-DD
        required: true
        default: '2026-04-30'
      mode:
        description: Watcher mode
        required: true
        default: offline_mock
        type: choice
        options: [offline_mock, operator_snapshot]
      run_opa:
        description: Run OPA policy tests
        required: false
        default: 'false'
        type: choice
        options: ['true','false']
permissions:
  contents: read
jobs:
  usda-plants-manual-watch:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      KFM_ALLOW_NETWORK: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.x'}
      - run: pytest tests/flora/test_usda_plants_manual_watcher.py
