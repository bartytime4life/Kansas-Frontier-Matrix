name: verification-baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      KFM_CROSSWALK_TEST_DSN: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run baseline shell checks and manifest checks
        run: |
          sh ./tools/ci/test_verify_baseline.sh
          sh ./tools/ci/test_check_readme_paths.sh
          sh ./tools/ci/test_check_python_syntax.sh
          sh ./tools/ci/check_readme_paths.sh --manifest ./tools/ci/readme_required_paths.txt
          sh ./tools/ci/check_python_syntax.sh
          sh ./tools/ci/verify_baseline.sh baseline-report.txt

      - name: Run crosswalk static checks
        run: |
          sh ./tools/ci/test_check_crosswalk_static.sh
          sh ./tools/ci/check_crosswalk_static.sh

      - name: Run scripts thin-slice checks
        run: |
          ./scripts/bootstrap.sh
          python3 ./scripts/validate_schemas.py
          python3 ./scripts/catalog_validate.py

      - name: Run policy and renderer fixture checks
        run: |
          python3 ./tools/ci/validate_policy_runtime_fixtures.py --root .
          python3 ./tools/ci/validate_renderer_fixtures.py --root .
          python3 ./tools/ci/report_placeholder_markers.py --root . --top 10
          python3 ./tools/ci/check_markdown_authority_thresholds.py --root .
          python3 ./tools/ci/check_governed_api_path_policy.py --root .
          python3 ./tools/ci/generate_markdown_debt_backlog.py --root . --top 10 --output artifacts/observability/markdown_debt_backlog.md

      - name: Install optional boundary test dependencies
        run: sh ./tools/ci/install_boundary_test_deps.sh

      - name: Run CI tests
        run: |
          python3 -m pytest -q tests/ci
          python3 -m pytest -q apps/governed-api/ecology/tests apps/ui/ecology/tests

          if [ -d ./tests/crosswalk ]; then
            python3 -m pytest -q tests/crosswalk
          fi

      - name: Run crosswalk runtime validation
        run: |
          sh ./tools/ci/test_check_crosswalk_runtime.sh
          sh ./tools/ci/check_crosswalk_runtime.sh

      - name: Build governed artifacts from fixed fixtures
        run: |
          python3 ./tools/ci/build_governed_artifacts.py --root . --out-dir artifacts/governed

      - name: Upload baseline report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: baseline-report
          path: baseline-report.txt
          if-no-files-found: warn

      - name: Upload governed artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: governed-artifacts
          path: artifacts/governed
          if-no-files-found: warn

      - name: Upload observability artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: observability-artifacts
          path: artifacts/observability
          if-no-files-found: warn
