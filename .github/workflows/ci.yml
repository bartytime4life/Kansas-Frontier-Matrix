  governed-object-fixtures:
    name: Governed object and fixture gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare
    if: ${{ needs.prepare.outputs.has_ai_surface == 'true' || needs.prepare.outputs.has_map_ui_surface == 'true' || needs.prepare.outputs.has_schemas == 'true' || needs.prepare.outputs.strict == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run KFM object-family and fixture checks
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          python - <<'PY'
          from __future__ import annotations
          import os
          import re
          import sys
          from pathlib import Path

          STRICT = os.environ.get('KFM_STRICT_OPTIONAL_GATES', 'false').lower() in {'1', 'true', 'yes'}
          REPORT = Path(os.environ.get('KFM_CI_ARTIFACT_DIR', '.kfm-ci')) / 'governed-object-fixtures.md'
          skip_parts = {'.git', 'node_modules', '.venv', 'venv', 'dist', 'build', 'coverage', '.next', '.pytest_cache', '__pycache__'}
          text_ext = {'.json', '.yaml', '.yml', '.md', '.py', '.ts', '.tsx', '.js', '.rego'}

          def skip(path: Path) -> bool:
              return any(part in skip_parts for part in path.parts)

          files: list[Path] = []
          corpus = ''
          for path in Path('.').rglob('*'):
              if path.is_file() and not skip(path) and path.suffix.lower() in text_ext:
                  files.append(path)
                  try:
                      corpus += '\n' + path.as_posix().lower() + '\n' + path.read_text(encoding='utf-8', errors='ignore').lower()
                  except Exception:
                      corpus += '\n' + path.as_posix().lower()

          groups = {
              'schema-validate': ['schema', 'contract'],
              'contract-tests': ['contract', 'openapi', 'dto'],
              'unit-tests': ['unit test', 'pytest', 'vitest', 'jest', 'go test', 'cargo test'],
              'citation-fixtures': ['citationvalidationreport', 'citation_validation_report', 'citation-fixture', 'citation fixture'],
              'focus-envelope-fixtures': ['focusqueryrequest', 'focusqueryresponse', 'focusmoderequest', 'focusmoderesponse', 'runtime_response_envelope', 'runtime response envelope'],
              'ai-adapter-mock-tests': ['mockadapter', 'mock_adapter', 'modeladapterrequest', 'modeladapterresponse', 'ai-adapter-mock'],
              'promotion-gate-fixtures': ['promotiondecision', 'promotion_decision', 'promotion-gate', 'promotion gate'],
              'catalog-matrix-fixtures': ['catalogmatrix', 'catalog_matrix', 'catalog-matrix'],
              'no-direct-model-client-check': ['no_direct_model_client', 'no-direct-model-client', 'direct model client'],
              'docs-link-check': ['docs-link', 'markdown link', 'link check'],
              'continuity-matrix-check': ['continuity matrix', 'continuity-matrix', 'supersession', 'migration map'],
              'source-descriptor': ['sourcedescriptor', 'source_descriptor'],
              'evidence-ref': ['evidenceref', 'evidence_ref'],
              'evidence-bundle': ['evidencebundle', 'evidence_bundle'],
              'decision-envelope': ['decisionenvelope', 'decision_envelope'],
              'release-manifest': ['releasemanifest', 'release_manifest', 'mapreleasemanifest', 'map_release_manifest'],
              'run-receipt': ['runreceipt', 'run_receipt'],
              'ai-receipt': ['aireceipt', 'ai_receipt'],
              'policy-decision': ['policydecision', 'policy_decision'],
              'evidence-drawer-payload': ['evidencedrawerpayload', 'evidence_drawer_payload'],
              'negative-state-payload': ['negativestatepayload', 'negative_state_payload'],
              'rollback-ref': ['rollbackref', 'rollback_ref', 'rollback target'],
              'layer-manifest': ['layermanifest', 'layer_manifest'],
              'style-manifest': ['stylemanifest', 'style_manifest'],
              'tile-artifact-manifest': ['tileartifactmanifest', 'tile_artifact_manifest'],
          }

          present: dict[str, bool] = {}
          for gate, needles in groups.items():
              present[gate] = any(needle in corpus for needle in needles)

          failures: list[str] = []
          warnings: list[str] = []
          core_gates = [
              'schema-validate', 'contract-tests', 'unit-tests', 'policy-decision', 'source-descriptor',
              'evidence-ref', 'evidence-bundle', 'decision-envelope', 'release-manifest', 'run-receipt',
          ]
          ai_gates = ['citation-fixtures', 'focus-envelope-fixtures', 'ai-adapter-mock-tests', 'ai-receipt', 'no-direct-model-client-check']
          promotion_gates = ['promotion-gate-fixtures', 'catalog-matrix-fixtures', 'rollback-ref']
          map_gates = ['evidence-drawer-payload', 'layer-manifest', 'style-manifest', 'tile-artifact-manifest']

          # Missing gates are warnings in a bare/scaffold repo and failures in strict mode.
          for gate in core_gates + ai_gates + promotion_gates + map_gates + ['docs-link-check', 'continuity-matrix-check']:
              if not present.get(gate, False):
                  msg = f'Missing or not discoverable: `{gate}`. Add repo-native tool/script, schema, fixture, or documentation marker.'
                  (failures if STRICT else warnings).append(msg)

          # Finite outcome discipline is mandatory whenever runtime/focus envelopes are present.
          finite_outcomes = {'answer', 'abstain', 'deny', 'error'}
          outcome_hits = {outcome for outcome in finite_outcomes if re.search(rf'\b{outcome}\b', corpus)}
          if (present.get('focus-envelope-fixtures') or 'runtime_response_envelope' in corpus or 'runtime response envelope' in corpus) and outcome_hits != finite_outcomes:
              failures.append(f'Runtime/Focus envelope surface found, but finite outcomes are incomplete. Found {sorted(outcome_hits)}, expected {sorted(finite_outcomes)}.')

          # If public map surfaces exist, Evidence Drawer should be visible as a trust fixture.
          public_map_markers = ('maplibre', 'pmtiles', 'layermanifest', 'layer_manifest', 'stylemanifest', 'style_manifest')
          if any(marker in corpus for marker in public_map_markers) and not present.get('evidence-drawer-payload'):
              failures.append('Map/UI delivery surface found without an EvidenceDrawerPayload marker or fixture.')

          REPORT.parent.mkdir(parents=True, exist_ok=True)
          with REPORT.open('w', encoding='utf-8') as f:
              f.write('# Governed object and fixture gate report\n\n')
              f.write(f'- Text/config files inspected: {len(files)}\n')
              f.write(f'- Strict optional gates: {STRICT}\n\n')
              f.write('## Gate presence\n\n')
              for gate in sorted(groups):
                  f.write(f'- `{gate}`: {"present" if present[gate] else "missing"}\n')
              f.write(f'\nFinite outcomes found: {sorted(outcome_hits)}\n')
              if failures:
                  f.write('\n## Blocking failures\n\n')
                  for item in failures:
                      f.write(f'- {item}\n')
              if warnings:
                  f.write('\n## Warnings\n\n')
                  for item in warnings:
                      f.write(f'- {item}\n')
              if not failures and not warnings:
                  f.write('\nNo governed object/fixture gate issues found.\n')

          print(REPORT.read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write(REPORT.read_text(encoding='utf-8'))
          if failures:
              sys.exit(1)
          PY

      - name: Upload governed object fixture artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-governed-object-fixtures
          path: .kfm-ci/governed-object-fixtures.md
          if-no-files-found: warn
          retention-days: 14

  docs-continuity:
    name: Documentation and continuity discipline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check docs, ADR, and TODO discipline
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          python - <<'PY'
          from __future__ import annotations
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          STRICT = os.environ.get('KFM_STRICT_OPTIONAL_GATES', 'false').lower() in {'1', 'true', 'yes'}
          REPORT = Path(os.environ.get('KFM_CI_ARTIFACT_DIR', '.kfm-ci')) / 'docs-continuity.md'
          failures: list[str] = []
          warnings: list[str] = []

          def run(cmd: list[str]) -> str:
              try:
                  return subprocess.check_output(cmd, text=True, stderr=subprocess.DEVNULL).strip()
              except subprocess.CalledProcessError:
                  return ''

          changed = ''
          if os.environ.get('GITHUB_EVENT_NAME') == 'pull_request':
              base = os.environ.get('GITHUB_BASE_REF')
              if base:
                  changed = run(['git', 'diff', '--name-only', f'origin/{base}...HEAD'])
          if not changed:
              changed = run(['git', 'diff', '--name-only', 'HEAD~1...HEAD'])
          changed_files = [line for line in changed.splitlines() if line]

          material_prefixes = ('.github/workflows/', 'schemas/', 'contracts/', 'policy/', 'policies/', 'tools/', 'apps/', 'packages/', 'data/registry/')
          doc_prefixes = ('docs/', 'README', 'CHANGELOG', 'CONTRIBUTING')
          material_changes = [p for p in changed_files if p.startswith(material_prefixes)]
          doc_changes = [p for p in changed_files if p.startswith(doc_prefixes)]
          adr_changes = [p for p in changed_files if p.startswith('docs/adr/') or '/adr/' in p.lower()]

          if material_changes and not doc_changes:
              message = 'Material KFM behavior/configuration changed without a docs/README/CHANGELOG update. Add docs or a PR note explaining why none is needed.'
              (failures if STRICT else warnings).append(message)
          if any(p.startswith(('schemas/', 'contracts/')) for p in material_changes) and not adr_changes:
              warnings.append('Schema/contract changes detected without docs/adr update. Confirm schema-home authority and versioning in an ADR or PR note.')

          vague_todo = re.compile(r'\bTODO\b(?!\(kfm-verify\))', re.I)
          for root in [Path('docs'), Path('schemas'), Path('contracts'), Path('policy'), Path('tools'), Path('apps'), Path('packages')]:
              if not root.exists():
                  continue
              for path in root.rglob('*'):
                  if not path.is_file() or path.suffix.lower() not in {'.md', '.txt', '.py', '.ts', '.tsx', '.js', '.json', '.yaml', '.yml', '.rego'}:
                      continue
                  try:
                      text = path.read_text(encoding='utf-8')
                  except Exception:
                      continue
                  for idx, line in enumerate(text.splitlines(), 1):
                      if vague_todo.search(line):
                          warnings.append(f'Vague TODO found at `{path}:{idx}`. Prefer TODO(kfm-verify): exact check, command/source, owner if known.')

          # Lightweight markdown internal-link check for docs.
          link_re = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
          for path in Path('.').rglob('*.md'):
              if any(part in {'.git', 'node_modules', '.venv'} for part in path.parts):
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except Exception:
                  continue
              for href in link_re.findall(text):
                  if href.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  target = href.split('#', 1)[0]
                  if not target:
                      continue
                  if not (path.parent / target).exists():
                      warnings.append(f'Possible broken local markdown link in `{path}` -> `{href}`')

          REPORT.parent.mkdir(parents=True, exist_ok=True)
          with REPORT.open('w', encoding='utf-8') as f:
              f.write('# Documentation and continuity report\n\n')
              f.write(f'- Changed files inspected: {len(changed_files)}\n')
              f.write(f'- Material changes: {len(material_changes)}\n')
              f.write(f'- Documentation changes: {len(doc_changes)}\n')
              f.write(f'- ADR changes: {len(adr_changes)}\n')
              f.write(f'- Strict optional gates: {STRICT}\n\n')
              if failures:
                  f.write('## Blocking failures\n\n')
                  for item in failures:
                      f.write(f'- {item}\n')
              if warnings:
                  f.write('\n## Warnings\n\n')
                  for item in warnings[:200]:
                      f.write(f'- {item}\n')
                  if len(warnings) > 200:
                      f.write(f'- ... {len(warnings) - 200} additional warnings omitted.\n')
              if not failures and not warnings:
                  f.write('No documentation or continuity issues found.\n')

          print(REPORT.read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write(REPORT.read_text(encoding='utf-8'))
          if failures:
              sys.exit(1)
          PY

      - name: Upload docs continuity artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-docs-continuity
          path: .kfm-ci/docs-continuity.md
          if-no-files-found: warn
          retention-days: 14

  catalog-proof-release:
    name: Catalog, proof, release, and publication gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare
    if: ${{ needs.prepare.outputs.has_release_surface == 'true' || needs.prepare.outputs.strict == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check proof-bearing release closure
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          python - <<'PY'
          from __future__ import annotations
          import os
          import re
          import sys
          from pathlib import Path

          STRICT = os.environ.get('KFM_STRICT_OPTIONAL_GATES', 'false').lower() in {'1', 'true', 'yes'}
          REPORT = Path(os.environ.get('KFM_CI_ARTIFACT_DIR', '.kfm-ci')) / 'catalog-proof-release.md'
          roots = [Path('data/published'), Path('data/releases'), Path('release'), Path('releases'), Path('data/proofs'), Path('data/receipts'), Path('data/catalog')]
          files = [p for root in roots if root.exists() for p in root.rglob('*') if p.is_file()]
          names = '\n'.join(p.as_posix().lower() for p in files)
          failures: list[str] = []
          warnings: list[str] = []

          required_patterns = {
              'ReleaseManifest': r'release[_-]?manifest|map[_-]?release[_-]?manifest',
              'EvidenceBundle': r'evidence[_-]?bundle',
              'ProofPack or proof object': r'proof[_-]?pack|/proofs?/|\.intoto|attestation',
              'RunReceipt or receipt': r'run[_-]?receipt|ai[_-]?receipt|/receipts?/',
              'Rollback target or correction reference': r'rollback|correction|withdrawal|supersession',
          }
          if files:
              for label, pat in required_patterns.items():
                  if not re.search(pat, names):
                      failures.append(f'Release/publication surface exists but no `{label}` marker was found.')
          elif STRICT:
              failures.append('No release/catalog/proof files found while strict optional gates are enabled.')
          else:
              warnings.append('No release/catalog/proof files found; release closure gate skipped.')

          for p in files:
              low = p.as_posix().lower()
              if re.search(r'(^|/)(raw|work|quarantine)(/|$)', low):
                  failures.append(f'Unsafe lifecycle path appears inside release surface: `{p}`')

          REPORT.parent.mkdir(parents=True, exist_ok=True)
          with REPORT.open('w', encoding='utf-8') as f:
              f.write('# Catalog, proof, release, and publication gate report\n\n')
              f.write(f'- Release/catalog/proof files inspected: {len(files)}\n')
              f.write(f'- Strict optional gates: {STRICT}\n\n')
              if failures:
                  f.write('## Blocking failures\n\n')
                  for item in failures:
                      f.write(f'- {item}\n')
              if warnings:
                  f.write('\n## Warnings\n\n')
                  for item in warnings:
                      f.write(f'- {item}\n')
              if not failures and not warnings:
                  f.write('Release closure markers found.\n')

          print(REPORT.read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write(REPORT.read_text(encoding='utf-8'))
          if failures:
              sys.exit(1)
          PY

      - name: Upload release gate artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-catalog-proof-release
          path: .kfm-ci/catalog-proof-release.md
          if-no-files-found: warn
          retention-days: 14

  final-status:
    name: Final governed CI decision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - prepare
      - static-guardrails
      - schema-and-fixtures
      - policy-tests
      - node-ci
      - python-ci
      - go-ci
      - rust-ci
      - governed-object-fixtures
      - docs-continuity
      - catalog-proof-release
    if: always()
    steps:
      - name: Summarize governed CI outcome
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import json
          import os
          import sys

          needs = json.loads(os.environ['NEEDS_JSON'])
          bad = {name: data['result'] for name, data in needs.items() if data['result'] not in {'success', 'skipped'}}
          skipped = {name: data['result'] for name, data in needs.items() if data['result'] == 'skipped'}
          lines = ['# Final governed CI decision', '']
          lines.append('## Job results')
          for name, data in sorted(needs.items()):
              lines.append(f"- `{name}`: **{data['result']}**")
          if skipped:
              lines.append('')
              lines.append('Skipped optional jobs are acceptable when the corresponding repo surface is absent.')
          if bad:
              lines.append('')
              lines.append('## Blocking failures')
              for name, result in bad.items():
                  lines.append(f'- `{name}` ended as `{result}`')
              decision = 'ERROR'
          else:
              lines.append('')
              lines.append('All required KFM CI gates completed or were intentionally skipped because their surface was absent.')
              decision = 'ANSWER'
          lines.append('')
          lines.append(f'Finite CI outcome: **{decision}**')
          text = '\n'.join(lines) + '\n'
          print(text)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
              f.write(text)
          if bad:
              sys.exit(1)
          PY

