name: KFM CI — governed evidence gate

run-name: >-
  KFM CI / ${{ github.event_name }} / ${{ github.ref_name }} / ${{ github.sha }}

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - 'release/**'
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      strict_optional_gates:
        description: 'Fail when optional KFM homes such as schemas/, policy/, docs/, or tests/ are missing.'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      strict_optional_gates:
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly verification pass for drift, stale gates, and dependency/toolchain changes.
    - cron: '17 8 * * 1'

permissions:
  contents: read
  pull-requests: read
  actions: read
  checks: read

concurrency:
  group: kfm-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# KFM CI posture:
# - CI is a trust-bearing evidence surface, not just a build script.
# - Public clients must remain downstream of governed APIs and released artifacts.
# - AI/model runtimes must not be called directly from browser/UI code.
# - RAW, WORK, and QUARANTINE stores must not be referenced by public UI/rendering paths.
# - Complex project-specific business logic should move into tools/ci/* over time; this file keeps guarded fallbacks
#   so the workflow can run before the repo-native tool suite is fully present.
env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.12'
  GO_VERSION: 'stable'
  OPA_VERSION: 'v1.15.1'
  KFM_CI_ARTIFACT_DIR: '.kfm-ci'
  KFM_STRICT_OPTIONAL_GATES: ${{ inputs.strict_optional_gates || 'false' }}

jobs:
  prepare:
    name: Prepare evidence inventory
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      strict: ${{ steps.detect.outputs.strict }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_go: ${{ steps.detect.outputs.has_go }}
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_schemas: ${{ steps.detect.outputs.has_schemas }}
      has_policy: ${{ steps.detect.outputs.has_policy }}
      has_docs: ${{ steps.detect.outputs.has_docs }}
      has_tests: ${{ steps.detect.outputs.has_tests }}
      has_release_surface: ${{ steps.detect.outputs.has_release_surface }}
      has_map_ui_surface: ${{ steps.detect.outputs.has_map_ui_surface }}
      has_ai_surface: ${{ steps.detect.outputs.has_ai_surface }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect repository surfaces
        id: detect
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"

          truthy_input="${KFM_STRICT_OPTIONAL_GATES,,}"
          if [ "$truthy_input" = "true" ] || [ "$truthy_input" = "1" ] || [ "$truthy_input" = "yes" ]; then
            strict=true
          else
            strict=false
          fi
          echo "strict=$strict" >> "$GITHUB_OUTPUT"

          exists_any() {
            local path
            for path in "$@"; do
              if compgen -G "$path" >/dev/null 2>&1; then
                return 0
              fi
            done
            return 1
          }

          has_find() {
            find . \
              -path './.git' -prune -o \
              -path './node_modules' -prune -o \
              -path './.venv' -prune -o \
              -path './dist' -prune -o \
              -path './build' -prune -o \
              "$@" -print -quit | grep -q .
          }

          flag() {
            local name="$1"; shift
            if "$@"; then
              echo "$name=true" >> "$GITHUB_OUTPUT"
              echo "$name=true" >> "$KFM_CI_ARTIFACT_DIR/surface-flags.env"
            else
              echo "$name=false" >> "$GITHUB_OUTPUT"
              echo "$name=false" >> "$KFM_CI_ARTIFACT_DIR/surface-flags.env"
            fi
          }

          flag has_node has_find \( -name package.json -o -name pnpm-lock.yaml -o -name package-lock.json -o -name yarn.lock \)
          flag has_python has_find \( -name pyproject.toml -o -name requirements.txt -o -name requirements-dev.txt -o -name setup.py \)
          flag has_go has_find \( -name go.mod -o -name go.work \)
          flag has_rust has_find \( -name Cargo.toml -o -name Cargo.lock \)
          flag has_schemas exists_any 'schemas/*' 'contracts/*'
          flag has_policy exists_any 'policy/*' 'policies/*' 'tools/policy/*'
          flag has_docs exists_any 'docs/*' '*.md'
          flag has_tests exists_any 'tests/*' '__tests__/*' 'apps/**/__tests__/*' 'packages/**/__tests__/*'
          flag has_release_surface exists_any 'data/published/*' 'data/releases/*' 'release/*' 'releases/*' 'data/proofs/*' 'data/receipts/*'
          flag has_map_ui_surface exists_any 'apps/web/*' 'web/*' 'ui/*' 'packages/maplibre*/*' 'packages/*map*/*'
          flag has_ai_surface exists_any 'packages/ai/*' 'apps/api/*ai*' 'contracts/ai/*' 'schemas/contracts/v1/ai/*' 'tools/validators/ai*'

          {
            echo "# KFM CI surface inventory"
            echo
            echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Ref: ${GITHUB_REF}"
            echo "SHA: ${GITHUB_SHA}"
            echo "Strict optional gates: ${strict}"
            echo
            echo "## Top-level inventory"
            find . -maxdepth 2 \
              -path './.git' -prune -o \
              -path './node_modules' -prune -o \
              -type f -o -type d | sort | sed 's#^./##' | head -250
            echo
            echo "## Package and build markers"
            find . \
              -path './.git' -prune -o \
              -path './node_modules' -prune -o \
              \( -name package.json -o -name pnpm-lock.yaml -o -name package-lock.json -o -name yarn.lock -o -name pyproject.toml -o -name requirements.txt -o -name go.mod -o -name Cargo.toml -o -name Makefile \) \
              -print | sort
          } > "$KFM_CI_ARTIFACT_DIR/repo-inventory.md"

          if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            git status --short > "$KFM_CI_ARTIFACT_DIR/git-status.txt"
            git branch --show-current > "$KFM_CI_ARTIFACT_DIR/git-branch.txt" || true
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git diff --name-only "origin/${{ github.base_ref }}"...HEAD > "$KFM_CI_ARTIFACT_DIR/changed-files.txt" || true
            else
              git diff --name-only HEAD~1...HEAD > "$KFM_CI_ARTIFACT_DIR/changed-files.txt" || true
            fi
          fi

          cat "$KFM_CI_ARTIFACT_DIR/repo-inventory.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v7
        with:
          name: kfm-ci-inventory
          path: .kfm-ci/
          if-no-files-found: warn
          retention-days: 14

  static-guardrails:
    name: Static trust membrane guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run KFM static guardrails
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          python - <<'PY'
          from __future__ import annotations
          import os
          import re
          import sys
          from pathlib import Path

          ROOT = Path('.')
          REPORT = Path(os.environ.get('KFM_CI_ARTIFACT_DIR', '.kfm-ci')) / 'static-guardrails.md'
          STRICT = os.environ.get('KFM_STRICT_OPTIONAL_GATES', 'false').lower() in {'1', 'true', 'yes'}

          TEXT_EXT = {
              '.js', '.jsx', '.ts', '.tsx', '.mjs', '.cjs', '.py', '.go', '.rs', '.java', '.kt',
              '.json', '.jsonl', '.yaml', '.yml', '.toml', '.md', '.mdx', '.html', '.css', '.scss',
              '.sql', '.sh', '.bash', '.ps1', '.rego', '.env', '.example'
          }
          SKIP_PARTS = {'.git', 'node_modules', '.venv', 'venv', 'dist', 'build', 'coverage', '.next', '.turbo', '.pytest_cache', '__pycache__'}
          DOC_PARTS = {'docs', 'documentation', 'README.md'}
          TEST_PARTS = {'tests', '__tests__', 'fixtures', 'testdata', '__fixtures__'}
          PUBLIC_CLIENT_PARTS = {
              'apps/web', 'web', 'ui', 'frontend', 'client', 'packages/maplibre', 'packages/maplibre-runtime',
              'packages/ui', 'packages/shell', 'src/components', 'src/pages'
          }

          secret_patterns = [
              ('committed .env file', re.compile(r'(^|/)\.env($|\.)')),
              ('private key block', re.compile(r'-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----')),
              ('AWS access key-like token', re.compile(r'AKIA[0-9A-Z]{16}')),
              ('GitHub token-like secret', re.compile(r'gh[pousr]_[A-Za-z0-9_]{30,}')),
              ('generic secret assignment', re.compile(r'(?i)(secret|token|password|api[_-]?key)\s*[:=]\s*["\'][^"\']{12,}["\']')),
          ]
          direct_model_patterns = [
              ('direct Ollama localhost runtime', re.compile(r'(localhost|127\.0\.0\.1|0\.0\.0\.0):11434')),
              ('direct Ollama generate/chat API', re.compile(r'(/api/(generate|chat|embeddings)\b|ollama\.(generate|chat|embed)\b)', re.I)),
              ('browser-side model provider client', re.compile(r'from\s+["\'](?:openai|@anthropic-ai/sdk|ollama)["\']|new\s+OpenAI\s*\(', re.I)),
          ]
          raw_path_patterns = [
              ('RAW/WORK/QUARANTINE path in public surface', re.compile(r'(?i)(data/)?(raw|work|quarantine)(/|\\|\b)')),
              ('unpublished candidate store in public surface', re.compile(r'(?i)(unpublished|candidate|canonical|internal)[-_ ]?(store|source|layer|tile)')),
          ]
          workflow_logic_patterns = [
              ('complex business logic should move from workflow YAML into tools/ci', re.compile(r'EvidenceBundle|DecisionEnvelope|PromotionDecision|RuntimeResponseEnvelope|SourceDescriptor')),
          ]

          def skip(path: Path) -> bool:
              return any(part in SKIP_PARTS for part in path.parts)

          def is_text_candidate(path: Path) -> bool:
              return path.suffix in TEXT_EXT or path.name in {'Dockerfile', 'Makefile'}

          def read_text(path: Path) -> str | None:
              try:
                  return path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  try:
                      return path.read_text(encoding='latin-1')
                  except Exception:
                      return None
              except Exception:
                  return None

          def is_docs_or_tests(path: Path) -> bool:
              parts = set(path.parts)
              return bool(parts & DOC_PARTS) or bool(parts & TEST_PARTS) or path.name.lower().startswith('readme')

          def is_public_client(path: Path) -> bool:
              s = path.as_posix()
              return any(s.startswith(prefix + '/') or s == prefix for prefix in PUBLIC_CLIENT_PARTS)

          findings: list[tuple[str, str, int, str]] = []
          warnings: list[tuple[str, str, int, str]] = []

          for path in ROOT.rglob('*'):
              if not path.is_file() or skip(path) or not is_text_candidate(path):
                  continue
              text = read_text(path)
              if text is None:
                  continue
              lines = text.splitlines()

              # Secrets and committed .env are hard failures except explicitly safe examples.
              for label, pat in secret_patterns:
                  if label == 'committed .env file':
                      if pat.search(path.as_posix()) and not (path.name.endswith('.example') or path.name.endswith('.sample') or path.name == '.env.example'):
                          findings.append((label, path.as_posix(), 1, 'Commit .env.example instead of real environment files.'))
                      continue
                  for i, line in enumerate(lines, 1):
                      if pat.search(line) and not is_docs_or_tests(path):
                          findings.append((label, path.as_posix(), i, line.strip()[:180]))

              # Public client must not call model runtimes or read governed stores directly.
              if is_public_client(path) and not is_docs_or_tests(path):
                  for label, pat in direct_model_patterns + raw_path_patterns:
                      for i, line in enumerate(lines, 1):
                          if pat.search(line):
                              findings.append((label, path.as_posix(), i, line.strip()[:180]))

              # Workflow business logic is a warning unless strict mode is enabled.
              if path.as_posix().startswith('.github/workflows/'):
                  for label, pat in workflow_logic_patterns:
                      for i, line in enumerate(lines, 1):
                          if pat.search(line) and 'tools/ci' not in text:
                              warnings.append((label, path.as_posix(), i, line.strip()[:180]))
                              break

          REPORT.parent.mkdir(parents=True, exist_ok=True)
          with REPORT.open('w', encoding='utf-8') as f:
              f.write('# Static guardrail report\n\n')
              f.write(f'Strict optional gates: {STRICT}\n\n')
              if findings:
                  f.write('## Blocking findings\n\n')
                  for label, file, line, msg in findings:
                      f.write(f'- **{label}** `{file}:{line}` — {msg}\n')
              else:
                  f.write('No blocking static guardrail findings.\n')
              if warnings:
                  f.write('\n## Warnings\n\n')
                  for label, file, line, msg in warnings:
                      f.write(f'- **{label}** `{file}:{line}` — {msg}\n')

          print(REPORT.read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write(REPORT.read_text(encoding='utf-8'))

          if findings or (STRICT and warnings):
              sys.exit(1)
          PY

      - name: Upload static guardrail artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-static-guardrails
          path: .kfm-ci/static-guardrails.md
          if-no-files-found: warn
          retention-days: 14

  schema-and-fixtures:
    name: Schema, contract, and fixture validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare
    if: ${{ needs.prepare.outputs.has_schemas == 'true' || needs.prepare.outputs.strict == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install schema tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install 'jsonschema>=4.23,<5' 'referencing>=0.35,<1' 'pyyaml>=6,<7'

      - name: Validate JSON/YAML contracts and typed fixtures
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          python - <<'PY'
          from __future__ import annotations
          import json
          import os
          import sys
          from pathlib import Path
          from typing import Any
          import yaml
          from jsonschema import Draft202012Validator, Draft7Validator, exceptions

          STRICT = os.environ.get('KFM_STRICT_OPTIONAL_GATES', 'false').lower() in {'1', 'true', 'yes'}
          REPORT = Path(os.environ.get('KFM_CI_ARTIFACT_DIR', '.kfm-ci')) / 'schema-validation.md'
          roots = [Path('schemas'), Path('contracts')]
          fixture_roots = [Path('tests/fixtures'), Path('fixtures'), Path('data/catalog'), Path('data/proofs'), Path('data/receipts'), Path('data/published')]
          skip_parts = {'.git', 'node_modules', '.venv', 'venv', 'dist', 'build', 'coverage', '.next', '.pytest_cache', '__pycache__'}

          def skip(path: Path) -> bool:
              return any(part in skip_parts for part in path.parts)

          def load(path: Path) -> Any:
              if path.suffix in {'.yaml', '.yml'}:
                  return yaml.safe_load(path.read_text(encoding='utf-8'))
              return json.loads(path.read_text(encoding='utf-8'))

          schema_files: list[Path] = []
          json_like_files: list[Path] = []
          for root in roots + fixture_roots:
              if not root.exists():
                  continue
              for path in root.rglob('*'):
                  if path.is_file() and not skip(path) and path.suffix in {'.json', '.yaml', '.yml'}:
                      json_like_files.append(path)
                      name = path.name.lower()
                      if 'schema' in name or path.as_posix().startswith('schemas/') or path.as_posix().startswith('contracts/'):
                          schema_files.append(path)

          failures: list[str] = []
          warnings: list[str] = []
          parsed: dict[Path, Any] = {}
          schema_by_id: dict[str, tuple[Path, Any]] = {}
          schema_by_name: dict[str, tuple[Path, Any]] = {}

          for path in json_like_files:
              try:
                  obj = load(path)
                  parsed[path] = obj
              except Exception as exc:
                  failures.append(f'Parse failure `{path}`: {exc}')

          for path in schema_files:
              obj = parsed.get(path)
              if not isinstance(obj, dict):
                  continue
              try:
                  validator_cls = Draft202012Validator if str(obj.get('$schema', '')).endswith('2020-12/schema') else Draft7Validator
                  validator_cls.check_schema(obj)
              except exceptions.SchemaError as exc:
                  failures.append(f'Invalid JSON Schema `{path}`: {exc.message}')
              sid = obj.get('$id') or obj.get('id') or obj.get('schema') or obj.get('name')
              if isinstance(sid, str):
                  schema_by_id[sid] = (path, obj)
              schema_by_name[path.stem.lower().replace('.schema', '')] = (path, obj)

          # Validate fixture-like objects when they explicitly name a schema id or schema name.
          validated_count = 0
          for path, obj in parsed.items():
              if path in schema_files or not isinstance(obj, dict):
                  continue
              ref = obj.get('$schema') or obj.get('schema_ref') or obj.get('schema') or obj.get('contract')
              candidate = None
              if isinstance(ref, str):
                  candidate = schema_by_id.get(ref) or schema_by_name.get(ref.lower().replace('.v1', '').replace('.json', ''))
              if candidate is None:
                  continue
              schema_path, schema_obj = candidate
              try:
                  Draft202012Validator(schema_obj).validate(obj)
                  validated_count += 1
              except Exception as exc:
                  failures.append(f'Fixture `{path}` failed against `{schema_path}`: {exc}')

          if not schema_files:
              msg = 'No schema/contract files found under schemas/ or contracts/.'
              (failures if STRICT else warnings).append(msg)
          if schema_files and validated_count == 0:
              warnings.append('Schemas parsed, but no fixtures explicitly referenced a schema id/name for validation.')

          REPORT.parent.mkdir(parents=True, exist_ok=True)
          with REPORT.open('w', encoding='utf-8') as f:
              f.write('# Schema, contract, and fixture validation\n\n')
              f.write(f'- Schema files inspected: {len(schema_files)}\n')
              f.write(f'- JSON/YAML files parsed: {len(parsed)}\n')
              f.write(f'- Typed fixtures validated: {validated_count}\n')
              f.write(f'- Strict optional gates: {STRICT}\n\n')
              if failures:
                  f.write('## Blocking failures\n\n')
                  for item in failures:
                      f.write(f'- {item}\n')
              if warnings:
                  f.write('\n## Warnings\n\n')
                  for item in warnings:
                      f.write(f'- {item}\n')
              if not failures and not warnings:
                  f.write('No schema or fixture validation issues found.\n')

          print(REPORT.read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write(REPORT.read_text(encoding='utf-8'))
          if failures:
              sys.exit(1)
          PY

      - name: Upload schema validation artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-schema-validation
          path: .kfm-ci/schema-validation.md
          if-no-files-found: warn
          retention-days: 14

  policy-tests:
    name: Policy-as-code tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare
    if: ${{ needs.prepare.outputs.has_policy == 'true' || needs.prepare.outputs.strict == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install OPA
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin" "$KFM_CI_ARTIFACT_DIR"
          curl -fsSL -o "$HOME/.local/bin/opa" "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x "$HOME/.local/bin/opa"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/opa" version | tee "$KFM_CI_ARTIFACT_DIR/opa-version.txt"

      - name: Run OPA formatting and tests
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          mapfile -t rego_files < <(find policy policies tools packages apps -type f -name '*.rego' 2>/dev/null | sort || true)
          {
            echo "# Policy-as-code report"
            echo
            echo "OPA version: ${OPA_VERSION}"
            echo "Rego file count: ${#rego_files[@]}"
            echo
          } > "$KFM_CI_ARTIFACT_DIR/policy-tests.md"

          if [ "${#rego_files[@]}" -eq 0 ]; then
            if [ "${KFM_STRICT_OPTIONAL_GATES,,}" = "true" ]; then
              echo "No Rego policy files found, and strict optional gates are enabled." | tee -a "$KFM_CI_ARTIFACT_DIR/policy-tests.md"
              exit 1
            fi
            echo "No Rego policy files found; policy tests skipped." | tee -a "$KFM_CI_ARTIFACT_DIR/policy-tests.md"
            cat "$KFM_CI_ARTIFACT_DIR/policy-tests.md" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          opa fmt --fail "${rego_files[@]}" | tee -a "$KFM_CI_ARTIFACT_DIR/policy-tests.md"
          mapfile -t rego_dirs < <(printf '%s\n' "${rego_files[@]}" | xargs -n1 dirname | sort -u)
          opa test "${rego_dirs[@]}" | tee -a "$KFM_CI_ARTIFACT_DIR/policy-tests.md"

          if ! printf '%s\n' "${rego_files[@]}" | grep -Eq '(_test\.rego$|/test/)'; then
            if [ "${KFM_STRICT_OPTIONAL_GATES,,}" = "true" ]; then
              echo "Policy exists but no policy test files were found." | tee -a "$KFM_CI_ARTIFACT_DIR/policy-tests.md"
              exit 1
            else
              echo "Warning: policy exists but no policy test files were found." | tee -a "$KFM_CI_ARTIFACT_DIR/policy-tests.md"
            fi
          fi

          cat "$KFM_CI_ARTIFACT_DIR/policy-tests.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload policy artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-policy-tests
          path: .kfm-ci/
          if-no-files-found: warn
          retention-days: 14

  node-ci:
    name: Node / UI / TypeScript tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: prepare
    if: ${{ needs.prepare.outputs.has_node == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ hashFiles('pnpm-lock.yaml') != '' && 'pnpm' || hashFiles('yarn.lock') != '' && 'yarn' || hashFiles('package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: |
            pnpm-lock.yaml
            yarn.lock
            package-lock.json
            **/package-lock.json

      - name: Install Node dependencies
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          if [ ! -f package.json ]; then
            echo "No root package.json found. Nested packages detected by prepare; add a repo-native tools/ci/node.sh for monorepo installs." | tee "$KFM_CI_ARTIFACT_DIR/node-ci.md"
            if [ "${KFM_STRICT_OPTIONAL_GATES,,}" = "true" ]; then exit 1; fi
            exit 0
          fi

          corepack enable || true
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --immutable
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Run Node repository scripts
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          if [ ! -f package.json ]; then
            exit 0
          fi

          run_script_if_present() {
            local script="$1"
            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['$script'] ? 0 : 1)"; then
              echo "Running npm script: $script" | tee -a "$KFM_CI_ARTIFACT_DIR/node-ci.md"
              if [ -f pnpm-lock.yaml ]; then pnpm run "$script";
              elif [ -f yarn.lock ]; then yarn run "$script";
              else npm run "$script"; fi
            else
              echo "Script not present: $script" | tee -a "$KFM_CI_ARTIFACT_DIR/node-ci.md"
            fi
          }

          run_script_if_present lint
          run_script_if_present typecheck
          run_script_if_present test:ci
          run_script_if_present test
          run_script_if_present test:contracts
          run_script_if_present test:fixtures
          run_script_if_present test:ui
          run_script_if_present build

          cat "$KFM_CI_ARTIFACT_DIR/node-ci.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Node CI artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-node-ci
          path: .kfm-ci/node-ci.md
          if-no-files-found: warn
          retention-days: 14

  python-ci:
    name: Python tests and validators
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: prepare
    if: ${{ needs.prepare.outputs.has_python == 'true' || needs.prepare.outputs.has_tests == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest ruff mypy jsonschema pyyaml
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then
            python -m pip install -e '.[test]' || python -m pip install -e . || true
          elif [ -f setup.py ]; then
            python -m pip install -e . || true
          fi

      - name: Run Python lint/type/test gates
        run: |
          set -euo pipefail
          mkdir -p "$KFM_CI_ARTIFACT_DIR"
          {
            echo "# Python CI report"
            echo
            python --version
            echo
          } > "$KFM_CI_ARTIFACT_DIR/python-ci.md"

          if [ -f pyproject.toml ] || [ -f ruff.toml ] || [ -f .ruff.toml ]; then
            echo "Running ruff check" | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
            python -m ruff check . | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
          else
            echo "No ruff config found; skipping ruff." | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
          fi

          if [ -f mypy.ini ] || grep -q '\[tool\.mypy\]' pyproject.toml 2>/dev/null; then
            echo "Running mypy" | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
            python -m mypy . | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
          else
            echo "No mypy config found; skipping mypy." | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
          fi

          if [ -d tests ] || find . -path './.git' -prune -o -name 'test_*.py' -print -quit | grep -q .; then
            echo "Running pytest" | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
            python -m pytest -q | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
          else
            echo "No Python tests found; skipping pytest." | tee -a "$KFM_CI_ARTIFACT_DIR/python-ci.md"
          fi

          cat "$KFM_CI_ARTIFACT_DIR/python-ci.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Python CI artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfm-python-ci
          path: .kfm-ci/python-ci.md
          if-no-files-found: warn
          retention-days: 14

  go-ci:
