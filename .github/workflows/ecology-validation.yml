name: Ecology Validation

on:
  pull_request:
    paths:
      - "docs/domains/ecology/**"
      - "data/registry/ecology/**"
      - "schemas/contracts/v1/ecology/**"
      - "policy/ecology/**"
      - "tools/validators/ecology/**"
      - "tests/fixtures/ecology/**"
      - ".github/workflows/ecology-validation.yml"
  push:
    branches:
      - main
    paths:
      - "docs/domains/ecology/**"
      - "data/registry/ecology/**"
      - "schemas/contracts/v1/ecology/**"
      - "policy/ecology/**"
      - "tools/validators/ecology/**"
      - "tests/fixtures/ecology/**"
      - ".github/workflows/ecology-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ecology-fixtures:
    name: Validate ecology fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pyyaml

      - name: Ensure runner is executable
        run: chmod +x tools/validators/ecology/run_ecology_fixture_checks.sh

      - name: Run ecology fixture checks
        run: tools/validators/ecology/run_ecology_fixture_checks.sh
