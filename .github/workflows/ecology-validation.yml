name: Ecology Validation

on:
  pull_request:
    paths:
      - "docs/domains/ecology/**"
      - "apps/governed_api/ecology/**"
      - "data/registry/ecology/**"
      - "data/processed/ecology/**"
      - "data/catalog/ecology/**"
      - "data/triplets/ecology/**"
      - "data/receipts/ecology/**"
      - "data/proofs/ecology/**"
      - "data/published/ecology/**"
      - "schemas/contracts/v1/ecology/**"
      - "policy/ecology/**"
      - "tools/validators/ecology/**"
      - "tests/fixtures/ecology/**"
      - ".github/workflows/ecology-validation.yml"
  push:
    branches:
      - main
    paths:
      - "docs/domains/ecology/**"
      - "apps/governed_api/ecology/**"
      - "data/registry/ecology/**"
      - "data/processed/ecology/**"
      - "data/catalog/ecology/**"
      - "data/triplets/ecology/**"
      - "data/receipts/ecology/**"
      - "data/proofs/ecology/**"
      - "data/published/ecology/**"
      - "schemas/contracts/v1/ecology/**"
      - "policy/ecology/**"
      - "tools/validators/ecology/**"
      - "tests/fixtures/ecology/**"
      - ".github/workflows/ecology-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecology-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ecology-validation:
    name: Validate ecology control plane
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install validator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pyyaml

      - name: Check required ecology validator files
        run: |
          test -f tools/validators/ecology/validate_ecology_bundle.py
          test -f tools/validators/ecology/run_ecology_fixture_checks.sh
          test -f tools/validators/ecology/run_ecology_release_checks.sh
          test -f tools/validators/ecology/run_ecology_focus_mode_checks.sh
          test -f tools/validators/ecology/run_ecology_ui_checks.sh
          test -f data/registry/ecology/sources.yaml
          test -f data/registry/ecology/datasets.yaml
          test -f data/registry/ecology/sensitivity_policies.yaml

      - name: Ensure runners are executable
        run: |
          chmod +x tools/validators/ecology/validate_ecology_bundle.py
          chmod +x tools/validators/ecology/run_ecology_fixture_checks.sh
          chmod +x tools/validators/ecology/run_ecology_release_checks.sh
          chmod +x tools/validators/ecology/run_ecology_focus_mode_checks.sh
          chmod +x tools/validators/ecology/run_ecology_ui_checks.sh

      - name: Run ecology fixture checks
        run: tools/validators/ecology/run_ecology_fixture_checks.sh

      - name: Run ecology release checks
        run: tools/validators/ecology/run_ecology_release_checks.sh

      - name: Run ecology Focus Mode checks
        run: tools/validators/ecology/run_ecology_focus_mode_checks.sh

      - name: Run ecology UI checks
        run: tools/validators/ecology/run_ecology_ui_checks.sh
