name: schema-validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-fixtures-against-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: make schemas
