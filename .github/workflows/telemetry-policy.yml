# KFM telemetry-policy readiness workflow.
#
# Responsibility:
#   Inspect the repository's telemetry validator, schema, fixture, test, emitter,
#   receipt, and three named policy surfaces without executing allow-by-default
#   placeholders or presenting documentation as enforcement.
#
# Trigger and trust boundary:
#   Pull requests, pushes to main, and explicit dispatch. Pull-request content
#   is untrusted. The workflow has read-only repository permission, performs no
#   dependency installation, receives no operational telemetry or secrets, and
#   does not connect to a collector, exporter, sink, dashboard, or public API.
#
# Inputs:
#   Telemetry contract/standard/ADR documentation, telemetry schema and receipt
#   inventories, the telemetry validator placeholder, the three named Rego
#   placeholders, expected fixture/test locations, and a bounded scan of
#   implementation-code roots for surfaced telemetry instrumentation.
#
# Outputs and outcomes:
#   Inspection output and job summaries only. Jobs confirm the bounded current
#   holds or fail on drift so schemas, fixtures, validators, policies, emitters,
#   sinks, receipts, and negative tests can be wired deliberately. No telemetry,
#   redaction, policy decision, receipt, proof, release, or publication occurs.
#
# Compatibility:
#   Preserve workflow name `telemetry-policy` and job ids/check names
#   `no-raw-evidence`, `no-prompts`, and `no-restricted-coords`; repository rules
#   may refer to those names.
#
# Rollback:
#   Revert this file. Do not restore echo-only green checks or run allow-by-
#   default policy stubs as though they prevent telemetry disclosure.
#
# Placement:
#   Directory Rules §5 assigns workflows and governance hooks to `.github/`.
#   Telemetry meaning, shapes, policy, validator code, tests, fixtures, runtime
#   implementation, receipts, and operational infrastructure remain in their
#   separate responsibility roots.

name: telemetry-policy

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telemetry-policy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: "0"
  PYTHONUNBUFFERED: "1"
  TZ: UTC

jobs:
  no-raw-evidence:
    name: no-raw-evidence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out inspected revision without persisted credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up inspection Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Confirm raw-evidence telemetry enforcement remains an explicit hold
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          validator_path = Path("tools/validators/validate_telemetry_safety.py")
          policy_path = Path("policy/ui/no_raw_in_telemetry.rego")
          schema_root = Path("schemas/contracts/v1/telemetry")
          receipt_root = Path("data/receipts/telemetry")
          required = [
              validator_path,
              policy_path,
              receipt_root / "README.md",
              Path("contracts/telemetry/README.md"),
              Path("docs/standards/TELEMETRY_MINIMUMS.md"),
              Path("docs/adr/ADR-0016-telemetry-redaction-posture.md"),
          ]
          missing = [path.as_posix() for path in required if not path.is_file()]
          assert not missing, f"required telemetry readiness evidence is missing: {missing}"

          validator = validator_path.read_text(encoding="utf-8")
          assert "# Greenfield validator stub: telemetry_safety" in validator
          assert 'raise NotImplementedError("Greenfield placeholder")' in validator

          policy = policy_path.read_text(encoding="utf-8")
          assert "Status: PROPOSED greenfield stub. No real rules yet." in policy
          assert "package kfm.no_raw_in_telemetry" in policy
          assert "default deny := false" in policy

          assert not schema_root.exists(), (
              "the telemetry schema lane has appeared; add accepted schema, fixture, "
              "validator, policy, and negative-test wiring"
          )
          for root in [
              Path("fixtures/telemetry"),
              Path("fixtures/contracts/v1/telemetry"),
              Path("tests/telemetry"),
              Path("tools/validators/telemetry"),
          ]:
              assert not root.exists(), (
                  f"{root} has appeared; replace this absence hold with executable, "
                  "fail-closed telemetry coverage"
              )

          receipt_payloads = sorted(
              path.as_posix()
              for path in receipt_root.rglob("*")
              if path.is_file() and path.name != "README.md"
          )
          assert not receipt_payloads, (
              "telemetry receipt instances have appeared; validate their schema, policy, "
              f"identity, redaction, integrity, and release linkage: {receipt_payloads}"
          )

          code_pattern = re.compile(
              r"\b(telemetry|opentelemetry|otlp|start_span|set_attribute|meter)\b",
              re.IGNORECASE,
          )
          surfaced_code = []
          for root in [Path("runtime"), Path("apps"), Path("packages"), Path("pipelines")]:
              for path in root.rglob("*"):
                  if path.is_file() and path.suffix in {".py", ".ts", ".tsx", ".js"}:
                      if code_pattern.search(path.read_text(encoding="utf-8", errors="ignore")):
                          surfaced_code.append(path.as_posix())
          assert not surfaced_code, (
              "telemetry implementation code has surfaced; wire accepted event shapes, "
              "allowlists, redaction, policy, negative tests, receipts, and sink controls "
              f"before retaining this readiness audit: {sorted(surfaced_code)}"
          )

          contract = Path("contracts/telemetry/README.md").read_text(encoding="utf-8")
          standard = Path("docs/standards/TELEMETRY_MINIMUMS.md").read_text(encoding="utf-8")
          adr = Path(
              "docs/adr/ADR-0016-telemetry-redaction-posture.md"
          ).read_text(encoding="utf-8")
          assert "status: draft; PROPOSED" in contract
          assert "status: draft" in standard
          assert "status: proposed" in adr
          assert "payload fragments" in contract.lower()
          assert "no raw payload echo" in adr.lower()

          print("CONFIRMED: no telemetry schema, fixture, test, validator lane, receipt instance, or bounded emitter implementation is present.")
          print("CONFIRMED: no_raw_in_telemetry remains an allow-by-default PROPOSED Rego stub and the validator remains unimplemented.")
          print("WORKFLOW_SKIPPED_EXPLICIT: no telemetry event or raw-evidence payload was evaluated.")
          print("WORKFLOW_HOLD: no accepted event schema, allowlist, redactor, policy bundle, negative fixture, emitter, receipt flow, or sink control exists.")
          print("Repository absence is readiness evidence only; it is not proof that operational telemetry cannot disclose raw evidence.")
          PY

      - name: Record raw-evidence telemetry boundary
        if: always()
        shell: bash
        run: |
          {
            echo "### Raw evidence in telemetry"
            echo
            echo "- **WORKFLOW_SKIPPED_EXPLICIT / WORKFLOW_HOLD:** the named Rego policy is allow-by-default scaffolding, the validator raises NotImplementedError, and no telemetry schema/fixture/test/emitter/receipt implementation is wired."
            echo "- Result: ${{ job.status }}. No telemetry event was evaluated; repository absence is not proof that operational telemetry cannot disclose raw evidence."
            echo "- No telemetry, redaction, policy decision, receipt, proof, release record, or publication authority was emitted."
          } >> "$GITHUB_STEP_SUMMARY"

  no-prompts:
    name: no-prompts
    needs:
      - no-raw-evidence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out inspected revision without persisted credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up inspection Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Confirm prompt telemetry enforcement remains an explicit hold
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          policy_path = Path("policy/ui/no_prompt_in_telemetry.rego")
          contract_path = Path("contracts/telemetry/README.md")
          standard_path = Path("docs/standards/TELEMETRY_MINIMUMS.md")
          adr_path = Path("docs/adr/ADR-0016-telemetry-redaction-posture.md")
          required = [policy_path, contract_path, standard_path, adr_path]
          missing = [path.as_posix() for path in required if not path.is_file()]
          assert not missing, f"required prompt-telemetry evidence is missing: {missing}"

          policy = policy_path.read_text(encoding="utf-8")
          assert "Status: PROPOSED greenfield stub. No real rules yet." in policy
          assert "package kfm.no_prompt_in_telemetry" in policy
          assert "default deny := false" in policy

          contract = contract_path.read_text(encoding="utf-8").lower()
          standard = standard_path.read_text(encoding="utf-8").lower()
          adr = adr_path.read_text(encoding="utf-8").lower()
          assert "raw prompts" in contract
          assert "no prompt content" in adr
          assert "status: proposed" in adr
          assert "status: draft" in standard

          for root in [
              Path("fixtures/telemetry"),
              Path("fixtures/contracts/v1/telemetry"),
              Path("tests/telemetry"),
          ]:
              assert not root.exists(), (
                  f"{root} has appeared; wire prompt-free positive and prompt-bearing "
                  "negative cases to the accepted policy/validator"
              )

          print("CONFIRMED: no_prompt_in_telemetry remains an allow-by-default PROPOSED Rego stub.")
          print("CONFIRMED: telemetry docs forbid raw prompt content, while ADR-0016 remains proposed and the standard remains draft.")
          print("WORKFLOW_SKIPPED_EXPLICIT: no telemetry event or prompt-bearing negative fixture was evaluated.")
          print("WORKFLOW_HOLD: no accepted telemetry schema, prompt-field allowlist, redactor, policy implementation, fixture, or negative test exists.")
          print("Documentation and repository absence are not proof that operational telemetry cannot disclose prompts.")
          PY

      - name: Record prompt telemetry boundary
        if: always()
        shell: bash
        run: |
          {
            echo "### Prompts in telemetry"
            echo
            echo "- **WORKFLOW_SKIPPED_EXPLICIT / WORKFLOW_HOLD:** prompt exclusion is documented, but the named Rego policy is allow-by-default scaffolding and no telemetry schema, fixture, redactor, or executable negative test exists."
            echo "- Result: ${{ job.status }}. No event or prompt-bearing case was evaluated; documentation and repository absence are not operational proof."
            echo "- No telemetry, redaction, policy decision, receipt, proof, release record, or publication authority was emitted."
          } >> "$GITHUB_STEP_SUMMARY"

  no-restricted-coords:
    name: no-restricted-coords
    needs:
      - no-prompts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out inspected revision without persisted credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up inspection Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Confirm restricted-coordinate telemetry enforcement remains an explicit hold
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          policy_path = Path("policy/telemetry/no_restricted_coords.rego")
          contract_path = Path("contracts/telemetry/README.md")
          standard_path = Path("docs/standards/TELEMETRY_MINIMUMS.md")
          adr_path = Path("docs/adr/ADR-0016-telemetry-redaction-posture.md")
          required = [policy_path, contract_path, standard_path, adr_path]
          missing = [path.as_posix() for path in required if not path.is_file()]
          assert not missing, f"required coordinate-telemetry evidence is missing: {missing}"

          policy = policy_path.read_text(encoding="utf-8")
          assert "Status: PROPOSED greenfield stub. No real rules yet." in policy
          assert "package kfm.no_restricted_coords" in policy
          assert "default deny := false" in policy

          contract = contract_path.read_text(encoding="utf-8").lower()
          standard = standard_path.read_text(encoding="utf-8").lower()
          adr = adr_path.read_text(encoding="utf-8").lower()
          assert "exact restricted coordinates" in contract
          assert "replaces precise `lat` / `lon`" in adr
          assert "status: proposed" in adr
          assert "status: draft" in standard

          for root in [
              Path("fixtures/telemetry"),
              Path("fixtures/contracts/v1/telemetry"),
              Path("tests/telemetry"),
          ]:
              assert not root.exists(), (
                  f"{root} has appeared; wire generalized/redacted positive cases and "
                  "exact-coordinate negative cases to the accepted policy/validator"
              )

          print("CONFIRMED: no_restricted_coords remains an allow-by-default PROPOSED Rego stub.")
          print("CONFIRMED: telemetry docs forbid exact restricted coordinates, while ADR-0016 remains proposed and the standard remains draft.")
          print("WORKFLOW_SKIPPED_EXPLICIT: no telemetry event or exact-coordinate negative fixture was evaluated.")
          print("WORKFLOW_HOLD: no accepted geometry field schema, sensitivity binding, redactor/generalizer, policy implementation, fixture, or negative test exists.")
          print("Documentation and repository absence are not proof that operational telemetry cannot disclose restricted coordinates.")
          PY

      - name: Record restricted-coordinate telemetry boundary
        if: always()
        shell: bash
        run: |
          {
            echo "### Restricted coordinates in telemetry"
            echo
            echo "- **WORKFLOW_SKIPPED_EXPLICIT / WORKFLOW_HOLD:** coordinate exclusion is documented, but the named Rego policy is allow-by-default scaffolding and no telemetry schema, sensitivity binding, redactor/generalizer, fixture, or executable negative test exists."
            echo "- Result: ${{ job.status }}. No event or exact-coordinate case was evaluated; documentation and repository absence are not operational proof."
            echo "- No telemetry, redaction, policy decision, receipt, proof, release record, or publication authority was emitted."
          } >> "$GITHUB_STEP_SUMMARY"
