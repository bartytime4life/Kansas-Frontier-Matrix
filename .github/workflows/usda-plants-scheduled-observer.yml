name: USDA PLANTS Scheduled Observer
on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: Observation date YYYY-MM-DD
        required: true
        default: "2026-04-30"
      mode:
        description: Observation mode
        required: true
        default: scheduled_mock
        type: choice
        options: [scheduled_mock, scheduled_observe_only]
  schedule:
    - cron: "17 8 * * 1"
permissions:
  contents: read
jobs:
  scheduled-observer:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      KFM_ALLOW_SCHEDULED_OBSERVATION: "1"
      KFM_USDA_SOURCE_URI: "https://plants.sc.egov.usda.gov/downloads"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.x"}
      - run: mkdir -p /tmp/kfm-usda-plants/out
      - run: python tools/watchers/flora/usda_plants_scheduled_observer.py --mode scheduled_observe_only --source-uri "$KFM_USDA_SOURCE_URI" --snapshot-date "${{ inputs.snapshot_date || 'scheduled' }}" --out-dir /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"
      - run: python tools/alerts/flora/usda_plants_change_alert_builder.py --observation /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"/scheduled_observation.json --current-watch-state /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"/watch_state.json --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --out /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"/change_alert.json
      - run: python tools/review/flora/usda_plants_reviewer_queue_builder.py --alert /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"/change_alert.json --observation /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"/scheduled_observation.json --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --out /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"/reviewer_queue.json
      - run: python tools/artifacts/flora/usda_plants_artifact_bundle_builder.py --artifact-name usda-plants-observation-"${{ inputs.snapshot_date || 'scheduled' }}" --root-dir /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}" --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --out /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled/"${{ inputs.snapshot_date || 'scheduled' }}"/artifact_bundle.json
      - uses: actions/upload-artifact@v4
        with:
          name: usda-plants-observation
          path: /tmp/kfm-usda-plants/out/work/flora/usda_plants/scheduled
