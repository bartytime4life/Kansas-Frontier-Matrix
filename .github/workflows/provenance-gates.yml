name: Provenance Gates

on:
  pull_request:
    paths:
      - "contracts/v1/provenance/**"
      - "contracts/v1/catalog/dcat/**"
      - "contracts/v1/catalog/stac/**"
      - "contracts/v1/release/**"
      - "tools/validators/provenance/**"
      - "tools/validators/catalog/**"
      - "tools/validators/release/**"
      - "tools/resolvers/release/**"
      - "tools/release/**"
      - "policy/provenance/**"
      - "policy/catalog/dcat/**"
      - "policy/catalog/stac/**"
      - "policy/release/**"
      - "tests/fixtures/provenance/**"
      - "tests/fixtures/catalog/dcat/**"
      - "tests/fixtures/catalog/stac/**"
      - "tests/fixtures/release/**"
      - ".github/workflows/provenance-gates.yml"
  push:
    branches:
      - main
    paths:
      - "contracts/v1/provenance/**"
      - "contracts/v1/catalog/dcat/**"
      - "contracts/v1/catalog/stac/**"
      - "contracts/v1/release/**"
      - "tools/validators/provenance/**"
      - "tools/validators/catalog/**"
      - "tools/validators/release/**"
      - "tools/resolvers/release/**"
      - "tools/release/**"
      - "policy/provenance/**"
      - "policy/catalog/dcat/**"
      - "policy/catalog/stac/**"
      - "policy/release/**"
      - "tests/fixtures/provenance/**"
      - "tests/fixtures/catalog/dcat/**"
      - "tests/fixtures/catalog/stac/**"
      - "tests/fixtures/release/**"
      - ".github/workflows/provenance-gates.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provenance-schema-validator:
    name: Validate PROV sidecars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
      - run: |
          python tools/validators/provenance/validate_prov_sidecar.py \
            tests/fixtures/provenance/valid/minimal.prov.jsonld
      - run: |
          if python tools/validators/provenance/validate_prov_sidecar.py \
            tests/fixtures/provenance/invalid/missing_license.prov.jsonld; then
            echo "DENY: invalid missing_license fixture unexpectedly passed"
            exit 1
          fi

  provenance-policy:
    name: Evaluate provenance policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          CONFTEST_VERSION="0.56.0"
          curl -L \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            -o conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
      - run: |
          conftest test \
            tests/fixtures/provenance/valid/minimal.prov.jsonld \
            --policy policy/provenance
      - run: |
          if conftest test \
            tests/fixtures/provenance/invalid/missing_license.prov.jsonld \
            --policy policy/provenance; then
            echo "DENY: invalid missing_license fixture unexpectedly passed policy"
            exit 1
          fi

  dcat-schema-validator:
    name: Validate DCAT exports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
      - run: |
          python tools/validators/catalog/validate_dcat_dataset.py \
            tests/fixtures/catalog/dcat/valid/minimal.dataset.jsonld
      - run: |
          if python tools/validators/catalog/validate_dcat_dataset.py \
            tests/fixtures/catalog/dcat/invalid/restricted_access.dataset.jsonld; then
            echo "DENY: restricted_access fixture unexpectedly passed"
            exit 1
          fi
      - run: |
          if python tools/validators/catalog/validate_dcat_dataset.py \
            tests/fixtures/catalog/dcat/invalid/missing_provenance.dataset.jsonld; then
            echo "DENY: missing_provenance fixture unexpectedly passed"
            exit 1
          fi

  dcat-policy:
    name: Evaluate DCAT policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          CONFTEST_VERSION="0.56.0"
          curl -L \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            -o conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
      - run: |
          conftest test \
            tests/fixtures/catalog/dcat/valid/minimal.dataset.jsonld \
            --policy policy/catalog/dcat
      - run: |
          if conftest test \
            tests/fixtures/catalog/dcat/invalid/restricted_access.dataset.jsonld \
            --policy policy/catalog/dcat; then
            echo "DENY: restricted_access fixture unexpectedly passed policy"
            exit 1
          fi
      - run: |
          if conftest test \
            tests/fixtures/catalog/dcat/invalid/missing_provenance.dataset.jsonld \
            --policy policy/catalog/dcat; then
            echo "DENY: missing_provenance fixture unexpectedly passed policy"
            exit 1
          fi

  stac-schema-validator:
    name: Validate STAC exports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
      - run: |
          python tools/validators/catalog/validate_stac_item.py \
            tests/fixtures/catalog/stac/valid/minimal.item.json
      - run: |
          if python tools/validators/catalog/validate_stac_item.py \
            tests/fixtures/catalog/stac/invalid/missing_evidence_ref.item.json; then
            echo "DENY: missing_evidence_ref fixture unexpectedly passed"
            exit 1
          fi
      - run: |
          if python tools/validators/catalog/validate_stac_item.py \
            tests/fixtures/catalog/stac/invalid/restricted_policy_label.item.json; then
            echo "DENY: restricted_policy_label fixture unexpectedly passed"
            exit 1
          fi
      - run: |
          if python tools/validators/catalog/validate_stac_item.py \
            tests/fixtures/catalog/stac/invalid/missing_provenance_asset.item.json; then
            echo "DENY: missing_provenance_asset fixture unexpectedly passed"
            exit 1
          fi

  stac-policy:
    name: Evaluate STAC policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          CONFTEST_VERSION="0.56.0"
          curl -L \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            -o conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
      - run: |
          conftest test \
            tests/fixtures/catalog/stac/valid/minimal.item.json \
            --policy policy/catalog/stac
      - run: |
          if conftest test \
            tests/fixtures/catalog/stac/invalid/missing_evidence_ref.item.json \
            --policy policy/catalog/stac; then
            echo "DENY: missing_evidence_ref fixture unexpectedly passed policy"
            exit 1
          fi
      - run: |
          if conftest test \
            tests/fixtures/catalog/stac/invalid/restricted_policy_label.item.json \
            --policy policy/catalog/stac; then
            echo "DENY: restricted_policy_label fixture unexpectedly passed policy"
            exit 1
          fi
      - run: |
          if conftest test \
            tests/fixtures/catalog/stac/invalid/missing_provenance_asset.item.json \
            --policy policy/catalog/stac; then
            echo "DENY: missing_provenance_asset fixture unexpectedly passed policy"
            exit 1
          fi

  release-schema-validator:
    name: Validate ReleaseManifest closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
      - run: |
          python tools/validators/release/validate_release_manifest.py \
            tests/fixtures/release/valid/minimal.release-manifest.json
      - run: |
          if python tools/validators/release/validate_release_manifest.py \
            tests/fixtures/release/invalid/missing_provenance_ref.release-manifest.json; then
            echo "DENY: missing_provenance_ref fixture unexpectedly passed"
            exit 1
          fi

  release-policy:
    name: Evaluate ReleaseManifest policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          CONFTEST_VERSION="0.56.0"
          curl -L \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            -o conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
      - run: |
          conftest test \
            tests/fixtures/release/valid/minimal.release-manifest.json \
            --policy policy/release
      - run: |
          if conftest test \
            tests/fixtures/release/invalid/missing_provenance_ref.release-manifest.json \
            --policy policy/release; then
            echo "DENY: missing_provenance_ref fixture unexpectedly passed policy"
            exit 1
          fi

  release-closure:
    name: Resolve ReleaseManifest closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
      - run: |
          python tools/resolvers/release/resolve_release_manifest.py \
            tests/fixtures/release/valid/minimal.release-manifest.json
      - run: |
          if python tools/resolvers/release/resolve_release_manifest.py \
            tests/fixtures/release/invalid/missing_provenance_ref.release-manifest.json; then
            echo "DENY: missing_provenance_ref fixture unexpectedly passed closure"
            exit 1
          fi
      - run: |
          if python tools/resolvers/release/resolve_release_manifest.py \
            tests/fixtures/release/invalid/unresolved_artifact.release-manifest.json; then
            echo "DENY: unresolved_artifact fixture unexpectedly passed closure"
            exit 1
          fi

  release-publish-dry-run:
    name: Publish release dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
      - run: |
          python tools/release/publish_release.py \
            tests/fixtures/release/valid/minimal.release-manifest.json \
            --dry-run
      - run: |
          if python tools/release/publish_release.py \
            tests/fixtures/release/invalid/missing_provenance_ref.release-manifest.json \
            --dry-run; then
            echo "DENY: invalid release unexpectedly published"
            exit 1
          fi
      - run: |
          if python tools/release/publish_release.py \
            tests/fixtures/release/invalid/unresolved_artifact.release-manifest.json \
            --dry-run; then
            echo "DENY: unresolved artifact release unexpectedly published"
            exit 1
          fi
