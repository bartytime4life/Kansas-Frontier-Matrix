name: verify-docs

"on":
  pull_request:
    paths:
      - "*.md"
      - "**/*.md"
      - "**/*.mdx"
      - ".github/**/*.md"
      - ".github/workflows/verify-docs.yml"
  push:
    paths:
      - "*.md"
      - "**/*.md"
      - "**/*.mdx"
      - ".github/**/*.md"
      - ".github/workflows/verify-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-docs:
    name: Verify documentation integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Markdown links, anchors, and basic structure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/self-validation/docs

          python3 <<'PY'
          from __future__ import annotations

          import datetime as dt
          import json
          import os
          import re
          import sys
          from pathlib import Path
          from urllib.parse import unquote, urlsplit

          ROOT = Path(os.environ.get("GITHUB_WORKSPACE", ".")).resolve()
          REPORT_DIR = ROOT / "reports" / "self-validation" / "docs"
          REPORT_DIR.mkdir(parents=True, exist_ok=True)

          MARKDOWN_SUFFIXES = {".md", ".mdx"}
          IGNORE_PARTS = {
              ".git",
              ".hg",
              ".svn",
              ".venv",
              "venv",
              "node_modules",
              "vendor",
              "dist",
              "build",
              ".next",
              "coverage",
              "__pycache__",
          }
          IGNORE_PREFIXES = {
              Path("reports/self-validation/docs"),
          }
          EXTERNAL_SCHEMES = {"http", "https", "mailto", "tel", "ftp", "urn", "doi"}

          inline_link_re = re.compile(r"(?<!!)\[[^\]\n]+\]\(([^)]+)\)")
          image_link_re = re.compile(r"!\[[^\]\n]*\]\(([^)]+)\)")
          html_link_re = re.compile(r"(?:href|src)=[\"']([^\"']+)[\"']", re.IGNORECASE)
          ref_def_re = re.compile(r"^\s*\[[^\]]+\]:\s*(\S+)")
          heading_re = re.compile(r"^(#{1,6})\s+(.+?)\s*#*\s*$")
          html_anchor_re = re.compile(r"<(?:a|[^>]*\s)\b[^>]*(?:id|name)=[\"']([^\"']+)[\"'][^>]*>", re.IGNORECASE)
          unresolved_token_re = re.compile(
              r"(?:filecite:|fileciteturn|citeturn\d|turn\d+(?:file|search|view)\d)",
              re.IGNORECASE,
          )

          def relpath(path: Path) -> str:
              try:
                  return path.relative_to(ROOT).as_posix()
              except ValueError:
                  return path.as_posix()

          def is_ignored(path: Path) -> bool:
              try:
                  rel = path.relative_to(ROOT)
              except ValueError:
                  return True
              if any(part in IGNORE_PARTS for part in rel.parts):
                  return True
              return any(rel == prefix or prefix in rel.parents for prefix in IGNORE_PREFIXES)

          def iter_markdown_files() -> list[Path]:
              files: list[Path] = []
              for path in ROOT.rglob("*"):
                  if path.is_file() and path.suffix.lower() in MARKDOWN_SUFFIXES and not is_ignored(path):
                      files.append(path)
              return sorted(files, key=lambda p: relpath(p).lower())

          def non_code_lines(text: str):
              in_fence = False
              fence_char = ""
              for lineno, line in enumerate(text.splitlines(), start=1):
                  stripped = line.lstrip()
                  if stripped.startswith("```") or stripped.startswith("~~~"):
                      marker = stripped[:3]
                      if not in_fence:
                          in_fence = True
                          fence_char = marker[0]
                      elif stripped.startswith(fence_char * 3):
                          in_fence = False
                      continue
                  if not in_fence:
                      yield lineno, line

          def normalize_target(raw: str) -> str:
              target = raw.strip()
              if target.startswith("<") and ">" in target:
                  return target[1:target.find(">")].strip()
              if " " in target and not target.startswith("#"):
                  return target.split()[0].strip()
              return target

          def slugify_heading(text: str) -> str:
              text = re.sub(r"`([^`]*)`", r"\1", text)
              text = re.sub(r"!\[([^\]]*)\]\([^)]+\)", r"\1", text)
              text = re.sub(r"\[([^\]]+)\]\([^)]+\)", r"\1", text)
              text = re.sub(r"<[^>]+>", "", text)
              text = text.strip().lower()
              text = re.sub(r"&[a-z0-9#]+;", "", text)
              text = re.sub(r"[^\w\s-]", "", text, flags=re.UNICODE)
              text = text.replace("_", "-")
              text = re.sub(r"\s+", "-", text)
              text = re.sub(r"-+", "-", text).strip("-")
              return text or "section"

          anchor_cache: dict[Path, set[str]] = {}
          heading_cache: dict[Path, list[tuple[int, str, str]]] = {}

          def anchors_for(path: Path) -> set[str]:
              resolved = path.resolve()
              if resolved in anchor_cache:
                  return anchor_cache[resolved]
              anchors = {"top"}
              headings: list[tuple[int, str, str]] = []
              counts: dict[str, int] = {}
              try:
                  text = resolved.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  text = resolved.read_text(encoding="utf-8", errors="replace")
              for lineno, line in non_code_lines(text):
                  for anchor in html_anchor_re.findall(line):
                      anchors.add(anchor)
                  match = heading_re.match(line)
                  if not match:
                      continue
                  level = len(match.group(1))
                  title = match.group(2).strip()
                  base_slug = slugify_heading(title)
                  count = counts.get(base_slug, 0)
                  slug = base_slug if count == 0 else f"{base_slug}-{count}"
                  counts[base_slug] = count + 1
                  anchors.add(slug)
                  headings.append((level, title, slug))
              anchor_cache[resolved] = anchors
              heading_cache[resolved] = headings
              return anchors

          def resolve_markdown_target(source: Path, path_text: str) -> Path | None:
              if not path_text:
                  return source.resolve()
              raw = unquote(path_text)
              candidate = (ROOT / raw.lstrip("/")) if raw.startswith("/") else (source.parent / raw)
              candidate = candidate.resolve()
              if candidate.is_dir():
                  for name in ("README.md", "README.mdx", "index.md", "index.mdx"):
                      readme = candidate / name
                      if readme.exists():
                          return readme.resolve()
                  return candidate
              return candidate

          def extract_targets(path: Path) -> list[dict[str, object]]:
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  text = path.read_text(encoding="utf-8", errors="replace")
              targets: list[dict[str, object]] = []
              for lineno, line in non_code_lines(text):
                  for regex in (inline_link_re, image_link_re, html_link_re, ref_def_re):
                      for match in regex.finditer(line):
                          targets.append({"line": lineno, "target": normalize_target(match.group(1))})
              return targets

          files = iter_markdown_files()
          findings: list[dict[str, object]] = []
          warnings: list[dict[str, object]] = []

          for md in files:
              try:
                  text = md.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  text = md.read_text(encoding="utf-8", errors="replace")

              anchors_for(md)
              h1_count = sum(1 for level, _, _ in heading_cache.get(md.resolve(), []) if level == 1)
              if h1_count == 0:
                  warnings.append({"code": "missing_h1", "path": relpath(md), "message": "Markdown file has no H1 heading."})
              elif h1_count > 1:
                  warnings.append({"code": "multiple_h1", "path": relpath(md), "message": f"Markdown file has {h1_count} H1 headings."})

              if unresolved_token_re.search(text):
                  warnings.append({
                      "code": "unresolved_citation_token",
                      "path": relpath(md),
                      "message": "File appears to contain unresolved generated citation tokens; verify before publication.",
                  })

              for item in extract_targets(md):
                  lineno = int(item["line"])
                  target = str(item["target"]).strip()
                  if not target or target.startswith("<") or target.startswith("{"):
                      continue
                  parsed = urlsplit(target)
                  scheme = parsed.scheme.lower()
                  if scheme in EXTERNAL_SCHEMES:
                      continue
                  if scheme and scheme not in EXTERNAL_SCHEMES:
                      findings.append({
                          "code": "unsupported_link_scheme",
                          "path": relpath(md),
                          "line": lineno,
                          "target": target,
                          "message": f"Unsupported or unsafe link scheme '{scheme}'.",
                      })
                      continue

                  target_path = resolve_markdown_target(md, parsed.path)
                  fragment = unquote(parsed.fragment or "")

                  if target_path is None or (parsed.path and not target_path.exists()):
                      findings.append({
                          "code": "broken_relative_link",
                          "path": relpath(md),
                          "line": lineno,
                          "target": target,
                          "message": "Relative link target does not exist.",
                      })
                      continue

                  if fragment:
                      if target_path.suffix.lower() not in MARKDOWN_SUFFIXES:
                          warnings.append({
                              "code": "anchor_on_non_markdown_target",
                              "path": relpath(md),
                              "line": lineno,
                              "target": target,
                              "message": "Anchor target is not a Markdown file; anchor was not checked.",
                          })
                          continue
                      if fragment not in anchors_for(target_path):
                          findings.append({
                              "code": "missing_markdown_anchor",
                              "path": relpath(md),
                              "line": lineno,
                              "target": target,
                              "message": "Markdown anchor was not found in the target file.",
                          })

          checked_at = dt.datetime.now(dt.UTC).replace(microsecond=0).isoformat()
          summary = {
              "ok": not findings,
              "workflow": "verify-docs",
              "checked_at": checked_at,
              "commit": os.environ.get("GITHUB_SHA", "unknown"),
              "markdown_files_checked": len(files),
              "finding_count": len(findings),
              "warning_count": len(warnings),
              "findings": findings,
              "warnings": warnings,
          }

          (REPORT_DIR / "verify-docs-summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          (REPORT_DIR / "link_check.json").write_text(json.dumps({"ok": not findings, "findings": findings}, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          lines = [
              "# verify-docs summary",
              "",
              f"- Status: {'PASS' if not findings else 'FAIL'}",
              f"- Checked at: `{checked_at}`",
              f"- Markdown/MDX files checked: `{len(files)}`",
              f"- Blocking findings: `{len(findings)}`",
              f"- Warnings: `{len(warnings)}`",
              "",
          ]
          if findings:
              lines.append("## Blocking findings")
              for finding in findings[:50]:
                  lines.append(
                      f"- `{finding['code']}` in `{finding['path']}`"
                      f" line `{finding.get('line', '-')}` target `{finding.get('target', '-')}`: {finding['message']}"
                  )
              if len(findings) > 50:
                  lines.append(f"- ...and {len(findings) - 50} more findings. See JSON artifact.")
              lines.append("")
          if warnings:
              lines.append("## Warnings")
              for warning in warnings[:50]:
                  line_part = f" line `{warning.get('line')}`" if warning.get("line") else ""
                  lines.append(f"- `{warning['code']}` in `{warning['path']}`{line_part}: {warning['message']}")
              if len(warnings) > 50:
                  lines.append(f"- ...and {len(warnings) - 50} more warnings. See JSON artifact.")
              lines.append("")
          lines.append("Reviewer note: this CI summary is a review aid; repository authority remains in docs, contracts, schemas, policy, validators, fixtures, and release/proof surfaces.")
          (REPORT_DIR / "summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")

          print(json.dumps({"ok": not findings, "markdown_files_checked": len(files), "finding_count": len(findings), "warning_count": len(warnings)}, indent=2))
          if findings:
              sys.exit(1)
          PY

      - name: Publish reviewer summary
        if: always()
        shell: bash
        run: |
          if [[ -f reports/self-validation/docs/summary.md ]]; then
            cat reports/self-validation/docs/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# verify-docs summary" >> "$GITHUB_STEP_SUMMARY"
            echo "No summary was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload docs verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-docs-report
          path: reports/self-validation/docs/
          if-no-files-found: warn

