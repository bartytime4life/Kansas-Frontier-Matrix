name: Ecology Timeslice CI

on:
  pull_request:
    paths:
      - "connectors/pipelines/ecology/**"
      - "tools/validators/ecology/**"
      - "policy/ecology/**"
      - "schemas/contracts/v1/ecology/**"
      - "tests/fixtures/ecology/**"
      - "tests/governed_api/**"
      - ".github/workflows/ecology-timeslice.yml"
  push:
    branches:
      - main

jobs:
  ecology-timeslice:
    name: Validate ecology time-slice governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation + API test tools
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema check-jsonschema fastapi uvicorn pytest httpx

      - name: Install OPA
        run: |
          OPA_VERSION=1.0.0
          curl -L "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static" -o opa
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Install Conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -L "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Prepare dry-run artifact directories
        run: |
          mkdir -p /tmp/ecology-policy-assertions
          mkdir -p /tmp/ecology-ingest
          mkdir -p data/receipts/runs/dry-run

      # ----------------------------
      # INGEST
      # ----------------------------
      - name: Run HLS/Landsat ingest
        run: |
          python connectors/pipelines/ecology/hls_landsat_ingest.py \
            --scene-manifest tests/fixtures/ecology/timeslice/pass/scene_manifest.json \
            --out-dir /tmp/ecology-ingest

      - name: Validate ingest manifest schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/ingest_manifest.schema.json \
            /tmp/ecology-ingest/ingest_manifest.json

      - name: Validate QA summary schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/qa_summary.schema.json \
            /tmp/ecology-ingest/qa_summary.json

      - name: Validate tileset metadata schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/tileset_metadata.schema.json \
            /tmp/ecology-ingest/tileset_metadata.json

      # ----------------------------
      # POLICY + QA
      # ----------------------------
      - name: Parse ecology publication policy
        run: |
          opa parse policy/ecology/publication.rego

      - name: Validate QA timeslice ingest output
        run: |
          python tools/validators/ecology/validate_timeslice.py \
            --qa-summary /tmp/ecology-ingest/qa_summary.json \
            --tileset-metadata /tmp/ecology-ingest/tileset_metadata.json \
            --out /tmp/ecology_timeslice_qa_decision.json

      - name: Verify deterministic spec hash helper
        run: |
          python tools/validators/ecology/hash_spec.py \
            /tmp/ecology-ingest/tileset_metadata.json

      - name: Assert ecology publication policy decisions
        run: |
          for f in \
            publication_allow_timeslice_pass:allow \
            publication_allow_with_fallback:allow \
            publication_hold_timeslice_review:hold \
            publication_deny_timeslice_reject:deny \
            publication_deny_missing_receipt:deny \
            publication_deny_missing_fallback:deny \
            publication_deny_incomplete_tiles_no_steward:deny
          do
            name="${f%%:*}"
            expected="${f##*:}"

            python tools/validators/ecology/assert_rego_decision.py \
              --policy policy/ecology \
              --input "tests/fixtures/ecology/policy/${name}.json" \
              --query data.ecology.publication.decision \
              --expected "$expected" \
              --out "/tmp/ecology-policy-assertions/${name}.assertion.json"
          done

      - name: Extract allow policy decision
        id: policy_decision
        run: |
          decision="$(opa eval \
            --data policy/ecology \
            --input tests/fixtures/ecology/policy/publication_allow_timeslice_pass.json \
            --format raw \
            'data.ecology.publication.decision')"

          echo "decision=$decision" >> "$GITHUB_OUTPUT"

          if [ "$decision" != "allow" ]; then
            echo "ERROR: expected allow for promotion dry-run"
            exit 1
          fi

      # ----------------------------
      # PROMOTION + EVIDENCE
      # ----------------------------
      - name: Generate PromotionDecision
        run: |
          python tools/validators/ecology/generate_promotion_decision.py \
            --policy-decision "${{ steps.policy_decision.outputs.decision }}" \
            --candidate kfm://tileset/ecology/example-pass \
            --receipt-ref kfm://receipt/run/ecology/dry-run \
            --evidence-bundle-url kfm://evidence/ecology/example-pass-timeslice \
            --out /tmp/promotion_decision.json

      - name: Validate PromotionDecision schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/promotion_decision.schema.json \
            /tmp/promotion_decision.json

      - name: Build EvidenceBundle
        run: |
          python tools/validators/ecology/build_evidence_bundle.py \
            --bundle-id kfm://evidence/ecology/example-pass-timeslice \
            --artifact ingest_manifest=/tmp/ecology-ingest/ingest_manifest.json \
            --artifact qa_summary=/tmp/ecology-ingest/qa_summary.json \
            --artifact tileset_metadata=/tmp/ecology-ingest/tileset_metadata.json \
            --artifact qa_decision=/tmp/ecology_timeslice_qa_decision.json \
            --artifact promotion_decision=/tmp/promotion_decision.json \
            --object-ref kfm://tileset/ecology/example-pass \
            --policy-id kfm://policy/ecology/publication \
            --surface public \
            --publication-state ready \
            --source-role AUTHORITATIVE_LAYER \
            --claim-status CONFIRMED \
            --catalog-closure \
            --no-exact-geometry-present \
            --public-geometry-policy allow_exact \
            --public-visibility public \
            --out /tmp/evidence_bundle.json

      - name: Validate EvidenceBundle schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/evidence_bundle.schema.json \
            /tmp/evidence_bundle.json

      # ----------------------------
      # STAC
      # ----------------------------
      - name: Generate STAC Item
        run: |
          python tools/validators/ecology/generate_stac_item.py \
            --item-id kfm-ecology-example-pass \
            --collection kfm-ecology-timeslices \
            --tileset-metadata /tmp/ecology-ingest/tileset_metadata.json \
            --evidence-bundle kfm://evidence/ecology/example-pass-timeslice \
            --promotion-decision kfm://promotion/ecology/example-pass \
            --asset tileset=kfm://tileset/ecology/example-pass \
            --out /tmp/stac_item.json

      - name: Validate STAC Item schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/stac_item.schema.json \
            /tmp/stac_item.json

      - name: Generate STAC Collection
        run: |
          python tools/validators/ecology/generate_stac_collection.py \
            --collection-id kfm-ecology-timeslices \
            --item /tmp/stac_item.json \
            --out /tmp/stac_collection.json

      - name: Validate STAC Collection schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/stac_collection.schema.json \
            /tmp/stac_collection.json

      - name: Build STAC Catalog
        run: |
          python tools/validators/ecology/build_stac_catalog.py \
            --catalog-id kfm-ecology-catalog \
            --collection /tmp/stac_collection.json \
            --out /tmp/stac_catalog.json

      - name: Validate STAC Catalog schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/stac_catalog.schema.json \
            /tmp/stac_catalog.json

      # ----------------------------
      # FAIL-CLOSED
      # ----------------------------
      - name: Fail closed on required artifacts
        run: |
          required_artifacts=(
            "/tmp/ecology-ingest/ingest_manifest.json"
            "/tmp/ecology-ingest/qa_summary.json"
            "/tmp/ecology-ingest/tileset_metadata.json"
            "/tmp/ecology_timeslice_qa_decision.json"
            "/tmp/promotion_decision.json"
            "/tmp/evidence_bundle.json"
            "/tmp/stac_item.json"
            "/tmp/stac_collection.json"
            "/tmp/stac_catalog.json"
          )

          for artifact in "${required_artifacts[@]}"; do
            if [ ! -s "$artifact" ]; then
              echo "ERROR: missing $artifact"
              exit 1
            fi
          done

      # ----------------------------
      # RECEIPT
      # ----------------------------
      - name: Generate dry-run receipt
        run: |
          cat > data/receipts/runs/dry-run/run_receipt.json <<JSON
          {
            "schema_version": "v1",
            "object_type": "run_receipt",
            "run_id": "kfm://run/ecology/dry-run",
            "receipt_ref": "kfm://receipt/run/ecology/dry-run",
            "spec_hash": "dry-run",
            "outputs": {
              "stac_catalog": "/tmp/stac_catalog.json"
            }
          }
          JSON

      - name: Validate run receipt schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/run_receipt.schema.json \
            data/receipts/runs/dry-run/run_receipt.json

      # ----------------------------
      # API TESTS
      # ----------------------------
      - name: Run governed ecology API tests
        run: |
          pytest tests/governed_api/test_ecology_api.py
