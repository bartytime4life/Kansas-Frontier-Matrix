name: Ecology Timeslice CI

on:
  pull_request:
    paths:
      - "tools/validators/ecology/**"
      - "policy/ecology/**"
      - "schemas/contracts/v1/ecology/**"
      - "tests/fixtures/ecology/**"
      - ".github/workflows/ecology-timeslice.yml"
  push:
    branches:
      - main

jobs:
  ecology-timeslice:
    name: Validate ecology time-slice governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema check-jsonschema

      - name: Install OPA
        run: |
          OPA_VERSION=1.0.0
          curl -L "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static" -o opa
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Install Conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -L "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Prepare dry-run artifact directories
        run: |
          mkdir -p /tmp/ecology-policy-assertions
          mkdir -p data/receipts/runs/dry-run

      - name: Parse ecology publication policy
        run: |
          opa parse policy/ecology/publication.rego

      - name: Validate QA timeslice fixture
        run: |
          python tools/validators/ecology/validate_timeslice.py \
            --qa-summary tests/fixtures/ecology/timeslice/pass/qa_summary.json \
            --tileset-metadata tests/fixtures/ecology/timeslice/pass/tileset_metadata.json \
            --out /tmp/ecology_timeslice_qa_decision.json

      - name: Verify deterministic spec hash helper
        run: |
          python tools/validators/ecology/hash_spec.py \
            tests/fixtures/ecology/timeslice/pass/tileset_metadata.json

      - name: Assert ecology publication policy decisions
        run: |
          python tools/validators/ecology/assert_rego_decision.py \
            --policy policy/ecology \
            --input tests/fixtures/ecology/policy/publication_allow_timeslice_pass.json \
            --query data.ecology.publication.decision \
            --expected allow \
            --out /tmp/ecology-policy-assertions/publication_allow_timeslice_pass.assertion.json

          python tools/validators/ecology/assert_rego_decision.py \
            --policy policy/ecology \
            --input tests/fixtures/ecology/policy/publication_allow_with_fallback.json \
            --query data.ecology.publication.decision \
            --expected allow \
            --out /tmp/ecology-policy-assertions/publication_allow_with_fallback.assertion.json

          python tools/validators/ecology/assert_rego_decision.py \
            --policy policy/ecology \
            --input tests/fixtures/ecology/policy/publication_hold_timeslice_review.json \
            --query data.ecology.publication.decision \
            --expected hold \
            --out /tmp/ecology-policy-assertions/publication_hold_timeslice_review.assertion.json

          python tools/validators/ecology/assert_rego_decision.py \
            --policy policy/ecology \
            --input tests/fixtures/ecology/policy/publication_deny_timeslice_reject.json \
            --query data.ecology.publication.decision \
            --expected deny \
            --out /tmp/ecology-policy-assertions/publication_deny_timeslice_reject.assertion.json

          python tools/validators/ecology/assert_rego_decision.py \
            --policy policy/ecology \
            --input tests/fixtures/ecology/policy/publication_deny_missing_receipt.json \
            --query data.ecology.publication.decision \
            --expected deny \
            --out /tmp/ecology-policy-assertions/publication_deny_missing_receipt.assertion.json

          python tools/validators/ecology/assert_rego_decision.py \
            --policy policy/ecology \
            --input tests/fixtures/ecology/policy/publication_deny_missing_fallback.json \
            --query data.ecology.publication.decision \
            --expected deny \
            --out /tmp/ecology-policy-assertions/publication_deny_missing_fallback.assertion.json

          python tools/validators/ecology/assert_rego_decision.py \
            --policy policy/ecology \
            --input tests/fixtures/ecology/policy/publication_deny_incomplete_tiles_no_steward.json \
            --query data.ecology.publication.decision \
            --expected deny \
            --out /tmp/ecology-policy-assertions/publication_deny_incomplete_tiles_no_steward.assertion.json

      - name: Extract allow policy decision
        id: policy_decision
        run: |
          decision="$(opa eval \
            --data policy/ecology \
            --input tests/fixtures/ecology/policy/publication_allow_timeslice_pass.json \
            --format raw \
            'data.ecology.publication.decision')"

          echo "decision=$decision" >> "$GITHUB_OUTPUT"
          echo "Policy decision: $decision"

          if [ "$decision" != "allow" ]; then
            echo "ERROR: promotion dry-run must be backed by allow decision"
            exit 1
          fi

      - name: Generate PromotionDecision dry run
        run: |
          python tools/validators/ecology/generate_promotion_decision.py \
            --policy-decision "${{ steps.policy_decision.outputs.decision }}" \
            --candidate kfm://tileset/ecology/example-pass \
            --receipt-ref kfm://receipt/run/ecology/dry-run \
            --evidence-bundle-url kfm://evidence/ecology/example-pass-timeslice \
            --out /tmp/promotion_decision.json

      - name: Validate PromotionDecision schema
        run: |
          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/promotion_decision.schema.json \
            /tmp/promotion_decision.json

      - name: Generate and validate DENY PromotionDecision dry run
        run: |
          python tools/validators/ecology/generate_promotion_decision.py \
            --policy-decision deny \
            --candidate kfm://tileset/ecology/example-reject \
            --receipt-ref kfm://receipt/run/ecology/dry-run \
            --out /tmp/promotion_decision_deny.json

          grep '"decision": "DENY"' /tmp/promotion_decision_deny.json

          check-jsonschema \
            --schemafile schemas/contracts/v1/ecology/promotion_decision.schema.json \
            /tmp/promotion_decision_deny.json

      - name: Generate dry-run receipt
        run: |
          cat > data/receipts/runs/dry-run/run_receipt.json <<JSON
          {
            "schema_version": "v1",
            "object_type": "run_receipt",
            "run_id": "kfm://run/ecology/dry-run",
            "receipt_ref": "kfm://receipt/run/ecology/dry-run",
            "spec_hash": "dry-run",
            "inputs": {
              "qa_summary": "tests/fixtures/ecology/timeslice/pass/qa_summary.json",
              "tileset_metadata": "tests/fixtures/ecology/timeslice/pass/tileset_metadata.json",
              "policy_input": "tests/fixtures/ecology/policy/publication_allow_timeslice_pass.json"
            },
            "outputs": {
              "qa_decision": "/tmp/ecology_timeslice_qa_decision.json",
              "policy_assertions_dir": "/tmp/ecology-policy-assertions",
              "promotion_decision": "/tmp/promotion_decision.json",
              "promotion_decision_deny": "/tmp/promotion_decision_deny.json"
            },
            "policy_results": [
              {
                "policy": "policy/ecology/publication.rego",
                "query": "data.ecology.publication.decision",
                "result": "${{ steps.policy_decision.outputs.decision }}"
              }
            ],
            "promotion": {
              "decision_ref": "/tmp/promotion_decision.json",
              "decision": "PROMOTE"
            },
            "signatures": [],
            "timestamp": "TODO"
          }
          JSON

          python -m json.tool data/receipts/runs/dry-run/run_receipt.json > /tmp/run_receipt.pretty.json
