# Kansas Frontier Matrix Dependabot configuration
# Version: v1.1
# Updated: 2026-07-23
#
# Authority boundary:
# - Dependabot proposes dependency changes through pull requests.
# - It does not approve, merge, release, publish, change policy, or establish
#   that an update is compatible, secure, rights-cleared, or production-ready.
# - Security updates stay on the default branch because no target-branch is set.
# - Group rules and cooldowns below apply only to version updates; security
#   updates remain isolated and are not delayed by cooldown.
# - Cross-directory Python groups use dependency-name grouping so the same
#   dependency can be reviewed once across matching manifests.
# - npm, GitHub Actions, and pre-commit major updates remain individual for
#   focused compatibility and workflow-boundary review.
# - Labels are intentionally omitted until the repository label inventory is
#   verified. CODEOWNERS remains the review-routing surface.
# - Docker base-image monitoring is not enabled here because the current files
#   use custom Dockerfile.* placeholder names; supported discovery and intended
#   activation remain NEEDS VERIFICATION.
# - Private registries are not configured; adding one requires a separate
#   credentials, least-privilege, and external-code-execution review.

version: 2

updates:
  # Python monorepo: root app, application, package, domain-package, pipeline,
  # and connector manifests. Globs are intentionally bounded to known
  # responsibility roots rather than scanning every repository directory.
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
      - "/packages/domains/*"
      - "/pipelines/*"
      - "/connectors/*"
      - "/connectors/*/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 6
    assignees:
      - "bartytime4life"
    commit-message:
      prefix: "deps(python)"
      prefix-development: "deps(python-dev)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      python-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        group-by: "dependency-name"
      python-major:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "major"
        group-by: "dependency-name"

  # The root package.json declares the apps/* and packages/* workspaces.
  # Production and development minor/patch updates stay in separate PRs;
  # major updates are intentionally left ungrouped.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 4
    assignees:
      - "bartytime4life"
    commit-message:
      prefix: "deps(node)"
      prefix-development: "deps(node-dev)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      node-production-minor-patch:
        applies-to: "version-updates"
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      node-development-minor-patch:
        applies-to: "version-updates"
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions references in .github/workflows and repository-local actions.
  # Minor/patch updates are grouped; major action boundary changes stay isolated.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    assignees:
      - "bartytime4life"
    commit-message:
      prefix: "ci(actions)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      actions-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Root .pre-commit-config.yaml hook revisions.
  # Minor/patch updates are grouped; major hook changes stay isolated.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 2
    assignees:
      - "bartytime4life"
    commit-message:
      prefix: "chore(pre-commit)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      pre-commit-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
