# Kansas Frontier Matrix (KFM) — Dependency automation (governance-aware)
#
# Baseline goals (safe to apply early):
# - Keep GitHub Actions workflow/action versions current.
# - Keep PR volume predictable (grouping + limits).
# - Preserve fail-closed governance: Dependabot only opens PRs; CI/policy gates decide merge.
#
# GOVERNANCE
# - This file is governance-critical: it affects supply-chain posture and PR volume.
# - Changes here MUST NOT weaken fail-closed gates; require CODEOWNERS review.
# - Dependabot’s `reviewers` option was replaced/removed in favor of CODEOWNERS.
#   Use CODEOWNERS to require review/route Dependabot PRs.
#
# NOTE: Dependabot version updates must be enabled in repo settings, and this file must live at:
#       .github/dependabot.yml

version: 2

# Optional (future): consolidate updates across ecosystems into a single PR "bundle".
# This reduces PR noise in multi-stack repos, but requires per-ecosystem `patterns` +
# `multi-ecosystem-group` keys. Keep commented until you actually enable >1 ecosystem.
#
# multi-ecosystem-groups:
#   kfm_core_deps:
#     schedule:
#       interval: "weekly"
#       day: "monday"
#       time: "06:05"
#       timezone: "America/Chicago"

updates:
  # --- Core: keep GitHub Actions up to date (safe baseline; / searches .github/workflows) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5

    # Governance-friendly: delay major bumps briefly to avoid day-0 breakage.
    # (Security update PRs are not delayed by `cooldown`.)
    cooldown:
      semver-major-days: 7

    commit-message:
      prefix: "chore"
      include: "scope"

    # Optional: reduce CI churn from auto-rebases. Enable if your CI is expensive/noisy.
    # rebase-strategy: "disabled"

    groups:
      gha_minor_patch:
        # Group only non-breaking updates; majors remain separate PRs for review.
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

      gha_security:
        # Group security updates to reduce PR noise while keeping urgency visible.
        applies-to: "security-updates"
        patterns:
          - "*"

  # --- Optional: enable once the repo has npm manifests (package.json + lock files) ---
