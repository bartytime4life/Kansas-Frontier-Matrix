version: 2

updates:
  # GitHub requires directory: "/" for workflow and reusable-workflow updates.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # Root + monorepo app/package locations suggested by the current KFM docs.
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
      - "/infra/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "container"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    groups:
      docker-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      docker-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    groups:
      npm-prod-non-major:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        group-by: "dependency-name"
      npm-dev-non-major:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        group-by: "dependency-name"
      npm-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    groups:
      pip-prod-non-major:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        group-by: "dependency-name"
      pip-dev-non-major:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        group-by: "dependency-name"
      pip-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 1
    groups:
      cargo-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        group-by: "dependency-name"
      cargo-security:
        applies-to: "security-updates"
        patterns:
          - "*"

# Optional: if KFM later adds Java-based parsing or Tika-backed services,
# add Maven and/or Gradle blocks here so security advisories in those ecosystems
# are tracked by Dependabot as well.
