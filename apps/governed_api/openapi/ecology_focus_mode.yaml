openapi: 3.0.3
info:
  title: KFM Ecology Focus Mode
  version: v1
paths:
  /ecology/focus:
    post:
      summary: Run governed ecology Focus Mode query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FocusModeRequest'
      responses:
        "200":
          description: Governed response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FocusModeResponse'
components:
  schemas:
    FocusModeRequest:
      type: object
      properties:
        payload:
          type: object
      required:
        - payload
    FocusModeResponse:
      type: object
