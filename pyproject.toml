[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kfm-governed-ingestion-starter"
version = "0.1.0"
description = "KFM ecology/hydrology governed-ingestion starter kit with an evented source watcher and batched micro-runner for cosign-signed EvidenceBundles"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "jsonschema>=4.21",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "pytest-timeout>=2.3",
]

[tool.setuptools.packages.find]
include = ["tools*", "apps*", "packages*", "runtime*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--import-mode=importlib"

[tool.ruff]
line-length = 100
