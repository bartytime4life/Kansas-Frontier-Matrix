checks:
  - schema_valid
  - consent_present_when_required
  - consent_not_revoked
  - retention_not_expired
  - aggregation_at_or_above_required_level
  - no_exact_public_coordinates
  - export_format_allowed
  - rights_status_compatible
  - policy_label_compatible
  - evidence_and_receipt_hashes_match
allowed_export_formats: [gedcom, json, csv]
required_public_aggregation_level: county
