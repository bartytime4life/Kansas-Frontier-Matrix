version: "1.0.0"
description: "Promotion Contract gate map. build_gate_input.py materializes gate inputs for Conftest."

semantics:
  on_missing: "fail"
  on_policy_deny: "fail"
  on_integrity_error: "fail"
  cosign_blob_mode: "sigstore_bundle_required"

gates:
  A:
    name: "Evidence integrity"
    policy: "policy/evidence"
    requires:
      - "artifacts/EvidenceBundle.json"
      - "artifacts/spec_hash.txt"
    integrity:
      - "canonical_spec_hash"

  B:
    name: "Run provenance"
    policy: "policy/provenance"
    requires:
      - "artifacts/EvidenceBundle.json"
      - "artifacts/spec_hash.txt"
      - "artifacts/run_receipt.json"
      - "artifacts/signatures/evidence.sigstore.json"
    integrity:
      - "cosign_verify_blob_bundle"
      - "transparency_log_inclusion_in_bundle"

  C:
    name: "Rights and sensitivity"
    policy: "policy/rights"
    requires:
      - "artifacts/EvidenceBundle.json"
      - "LICENSE"
    integrity: []

  D:
    name: "Obligations applied"
    policy: "policy/obligations"
    requires:
      - "artifacts/EvidenceBundle.json"
      - "artifacts/redaction_receipt.json"
    integrity:
      - "post_process_spec_hash_when_redaction_required"

  E:
    name: "Stewardship approvals"
    policy: "policy/approvals"
    requires:
      - "artifacts/decision_log.json"
    integrity: []

  F:
    name: "Deploy preflight"
    policy: "policy/preflight"
    requires:
      - "artifacts/EvidenceBundle.json"
      - "artifacts/spec_hash.txt"
      - "artifacts/preflight_report.json"
    integrity: []

  G:
    name: "Final publish and archive"
    policy: "policy/release"
    requires:
      - "artifacts/EvidenceBundle.json"
      - "artifacts/spec_hash.txt"
      - "artifacts/decision_log.json"
      - "artifacts/release_manifest.json"
      - "artifacts/signatures/release_manifest.sigstore.json"
      - "artifacts/attestations/"
    integrity:
      - "release_manifest_artifact_hashes"
      - "cosign_verify_blob_bundle"
